<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日历 AI 助手 · 方向探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #E8E2D6; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directionBD.jsx"></script>
<script type="text/babel" src="directionA.jsx"></script>
<script type="text/babel" src="directionB.jsx"></script>
<script type="text/babel" src="directionC.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  function App() {
    return (
      <DesignCanvas>
        <DCSection id="chosen" title="B′ · 暖纸 Bento + Discord 风助手" subtitle="B 的月视图模板 · A 的暖纸配色 · 类 Discord 聊天面板">
          <DCArtboard id="BD" label="B′ · 选定方向" width={1440} height={940}>
            <DirectionBD />
          </DCArtboard>
        </DCSection>
        <DCSection id="dirs" title="早期三方向（参考）" subtitle="同一套数据 · 三种视觉方向 · 暖纸基底 / 蓝色强调">
          <DCArtboard id="A" label="A · 暖纸编辑风 — 月视图" width={1440} height={940}>
            <DirectionA />
          </DCArtboard>
          <DCArtboard id="B" label="B · Bento 大色块 + 深色指挥面板 — 月视图" width={1440} height={940}>
            <DirectionB />
          </DCArtboard>
          <DCArtboard id="C" label="C · 极简墨色 — 周视图时间轴" width={1440} height={940}>
            <DirectionC />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
