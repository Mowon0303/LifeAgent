    var html = '<div class="dD-body">最近任务操作历史如下。撤销只恢复本地 review 状态，并会写入一条新的本地 audit。</div>';
    if (!history.length) {
      return html + '<div class="dD-embed evidence"><div class="enote">还没有可显示的任务 review 历史。</div></div>';
    }
    var ACTION_LABEL = { 'task.review': '任务复核', 'task.review.bulk': '批量复核', 'calendar.sync': '加入日历' };
    history.slice(0, 8).forEach(function (item) {
      var label = REVIEW_STATUS_LABEL[item.status] || item.status || 'unknown';
      var previous = REVIEW_STATUS_LABEL[item.previous_status] || item.previous_status || '无';
      var count = item.reviewed_count || (item.task_ids || []).length || 0;
      var isCal = item.kind === 'calendar' || item.action === 'calendar.sync';
      var undoBtn = isCal
        ? '<button class="dD-cbtn warn" data-act="cal-undo" data-event-id="' + escapeHtml(item.event_id || '') + '"' +
          (item.undoable ? '' : ' disabled') + '>' + (item.undoable ? '退回' : '已退回') + '</button>'
        : '<button class="dD-cbtn warn" data-act="task-undo" data-audit-id="' + escapeHtml(item.audit_id) + '"' +
          (item.undoable ? '' : ' disabled') + '>' + (item.undoable ? '撤销' : '已不可撤销') + '</button>';
      html += '<div class="dD-embed evidence" data-audit-id="' + escapeHtml(item.audit_id) + '">' +
        '<div class="dD-task-kind">' + escapeHtml(ACTION_LABEL[item.action] || item.action || 'task.review') +
        ' · ' + escapeHtml(item.created_at || '') + '</div>' +
        '<div class="src-title">' + escapeHtml(item.summary || ('标记为 ' + label)) + '</div>' +
        '<div class="src-meta">数量 ' + escapeHtml(count) + ' · 之前 ' + escapeHtml(previous) +
        ' · 当前 ' + escapeHtml(label) + '</div>' +
        (item.confirmation_id ? '<div class="src-meta">确认 ID · ' + escapeHtml(item.confirmation_id) + '</div>' : '') +
        '<div class="dD-btns">' + undoBtn + '</div></div>';
    });
    return html;
  }

  // Unified review queue: pending calendar drafts + email review tasks, one card at a time.
  // Calendar drafts are inherently unread/pending, so they show under 全部 and 未读 only.
  function reviewItems() {
    // Primary surface is the agent's original intent: deadline → calendar. Only
    // pending calendar drafts cycle through the front card. The email-fact review
    // queue (amounts/actions + done/needs_verification/reviewed) is demoted into
    // the 更多 advanced block — kept for depth, out of the daily path.
    return state.queue.map(function (ev) { return { kind: 'calendar', ev: ev }; });
  }

  function calendarReviewCard(ev) {
    var c = categoryFor(ev);
    return '<div class="dD-body">这条本地证据是一个截止日程，确认后导出本地 ICS（不写外部日历）。</div>' +
      '<div class="dD-embed task cal-source-card" data-act="calendar-evidence" data-event-id="' +
        escapeHtml(ev.eventId) + '" role="button" tabindex="0" title="查看来源邮件" style="border-left-color:' + c.color + '">' +
      '<div class="dD-task-kind">日历草稿 · 截止' + (ev.uncertain ? ' · 需核对' : '') + '</div>' +
      '<div class="etitle">' + escapeHtml(ev.title) + (ev.uncertain ? ' ?' : '') + '</div>' +
      deadlineLineHtml(ev) +
      '<div class="esrc">来源 · ' + escapeHtml(ev.source) + '</div></div>' +
      '<div class="dD-btns" data-event-id="' + escapeHtml(ev.eventId) + '">' +
      '<button class="dD-cbtn sec" data-act="calendar-evidence">查看来源</button>' +
      '<button class="dD-cbtn prim" data-act="confirm">✓ 加入日历</button>' +
      '<button class="dD-cbtn sec" data-act="ignore">忽略</button></div>';
  }

  function reviewCardHtml() {
    var items = reviewItems();
    if (state.taskCursor >= items.length) state.taskCursor = items.length ? items.length - 1 : 0;
    if (state.taskCursor < 0) state.taskCursor = items.length ? items.length - 1 : 0;
    var total = items.length;
    var nav = '<div class="dD-cardnav" id="taskNavState">' +
      '<button class="dD-mini" data-act="task-prev"' + (total ? '' : ' disabled') + '>‹</button>' +
      '<span class="meta">' + (total ? state.taskCursor + 1 : 0) + '/' + total + ' · 待加入日历</span>' +
      '<button class="dD-mini" data-act="task-next"' + (total ? '' : ' disabled') + '>›</button></div>';
    if (!total) return nav + taskEmptyStateMessage();
    var item = items[state.taskCursor];
    return nav + (item.kind === 'calendar' ? calendarReviewCard(item.ev) : taskReviewCard(item.task, ''));
  }

  // single entry point for (re)rendering the current review card in place — no scroll jump
  function renderReviewCard(opts) {
    opts = opts || {};
    var slot = document.getElementById('taskCardSlot');
    if (slot) {
      slot.innerHTML = reviewCardHtml();
      if (opts.scroll) slot.scrollIntoView({ block: 'nearest' });
    }
  }
  // both legacy offer hooks now drive the one unified card
  function offerNextSuggestion() { renderReviewCard(); }
  function offerNextTaskSuggestion(opts) { renderReviewCard(opts); }

  function moveTaskCursor(offset) {
    var total = reviewItems().length;
    if (!total) { state.taskCursor = 0; renderReviewCard(); return; }
    state.taskCursor = (state.taskCursor + offset + total) % total;
    renderReviewCard();  // in-place: the ‹ › nav sits on the card, so the change is right here
  }

  function handleTaskFilter(kind, status) {
    if (kind) state.taskFilterKind = kind;
    if (status) state.taskFilterStatus = status;
    state.taskCursor = 0;
    updateSummary();
  }

  function handleTaskGroup(group) {
    if (!TASK_GROUP_LABEL[group] || state.busy) return;
    state.taskGroup = group;
    state.emailCursor = 0;  // chips filter the email-review pager — restart at its first card
    updateSummary();  // re-renders #dailySummary (chips + card) in place — no scroll jump
  }

  function handleTaskView(view) {
    if (!TASK_VIEW_LABEL[view] || state.busy) return;
    var config = TASK_VIEW_CONFIG[view] || TASK_VIEW_CONFIG.all;
    state.taskView = view;
    state.taskFilterKind = config.kind;
    state.taskFilterStatus = config.status;
    state.taskSort = config.sort;
    state.taskCursor = 0;
    state.busy = true;
    refresh()
      .then(offerNextTaskSuggestion)
      .catch(function (err) { botMessage('<div class="dD-body uncertain">预设视图刷新失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () { state.busy = false; });
  }

  function handleTaskSort(sort) {
    if (!TASK_SORT_LABEL[sort] || state.busy) return;
    state.taskSort = sort;
    state.taskCursor = 0;
    state.busy = true;
    refresh()
      .then(offerNextTaskSuggestion)
      .catch(function (err) { botMessage('<div class="dD-body uncertain">排序刷新失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () { state.busy = false; });
  }

  function updateSummary() {
    var embed = document.getElementById('aiSummary');
    if (embed) embed.outerHTML = summaryEmbed();
    var daily = document.getElementById('dailySummary');
    if (daily) daily.outerHTML = dailyEmbed();
    var dailyTasks = reviewItems().length;
    document.getElementById('aiTopic').textContent =
      '本地日历 · ' + (state.events.length + state.undated.length) + ' 条已确认 · ' + dailyTasks + ' 条截止待确认';
    renderHdrBadge();
  }

  // ---------- header bell (通知) + search (搜索) ----------
  function renderHdrBadge() {
    var badge = document.getElementById('hdrBellBadge');
    if (!badge) return;
    var count = state.queue.length + groupsInBucket('unread').length;
    badge.textContent = count > 99 ? '99+' : String(count);
    badge.className = 'badge' + (count ? ' on' : '');
  }

  function nearestDeadlines(n) {
    var todayKey = isoKey(new Date());
    return state.events.filter(function (i) { return i.dateKey && i.dateKey >= todayKey; })
      .concat(state.queue.filter(function (i) { return i.dateKey && i.dateKey >= todayKey; }))
      .sort(function (a, b) { return (a.dateKey || '').localeCompare(b.dateKey || ''); })
      .slice(0, n);
  }

  function headerNotifHtml() {
    var pendingDrafts = state.queue.length;
    var emailReview = groupsInBucket('unread').length;
    var receipt = (state.daily && state.daily.review_receipt) || {};
    var recent = (Array.isArray(receipt.recent) && receipt.recent.length) ? receipt.recent[0].summary : '';
    var rows = '';
    if (pendingDrafts) {
      rows += '<div class="nrow tap" data-act="hdr-goto" data-group="unread"><span class="nn">' + pendingDrafts +
        '</span><span class="nt">个截止待加入日历</span></div>';
    }
    if (emailReview) {
      rows += '<div class="nrow tap" data-act="hdr-goto" data-group="unread"><span class="nn">' + emailReview +
        '</span><span class="nt">封邮件待复核（金额/动作）</span></div>';
    }
    var ups = nearestDeadlines(3);
    if (ups.length) {
      rows += '<h5 class="sub">接下来</h5>' + ups.map(function (u) {
        return '<div class="nrow tap" data-act="hdr-deadline" data-key="' + escapeHtml(u.dateKey) + '">' +
          '<span class="nn">' + escapeHtml((u.dateKey || '').slice(5)) + '</span>' +
          '<span class="nt">' + escapeHtml(clip(u.title || '', 26)) + '</span></div>';
      }).join('');
    }
    if (recent) {
      rows += '<div class="nrow"><span class="nn">↺</span><span class="nt">最近变更 · ' + escapeHtml(clip(recent, 40)) + '</span></div>';
    }
    if (!rows) rows = '<div class="empty">暂无待处理的通知。</div>';
    return '<h5>通知</h5>' + rows;
  }

  function headerSearchHtml() {
    return '<div class="dD-hdrsearch"><h5>搜索邮件</h5>' +
      '<input id="hdrSearchInput" placeholder="输入关键词，回车搜索…" autocomplete="off">' +
      '<div class="res" id="hdrSearchRes"><div class="empty">在你本地的邮件证据里按关键词查找。</div></div></div>';
  }

  function runHeaderSearch(query) {
    var res = document.getElementById('hdrSearchRes');
    if (!res) return;
    var q = String(query || '').trim();
    if (!q) { res.innerHTML = '<div class="empty">在你本地的邮件证据里按关键词查找。</div>'; return; }
    res.innerHTML = '<div class="empty">搜索中…</div>';
    fetch('/api/rag/search?q=' + encodeURIComponent(q))
      .then(function (r) { return r.json(); })
      .then(function (docs) {
        var seen = {}, items = [];
        (docs || []).forEach(function (d) {
          var meta = d.metadata || {};
          var sid = String(meta.document_source_id || d.source_id || '');
          if (seen[sid]) return;
          seen[sid] = true;
          items.push({
            title: String(meta.title || meta.subject || '邮件'),
            sender: String(meta.sender || ''),
            snippet: clip(String(d.text || ''), 90)
          });
        });
        if (!items.length) { res.innerHTML = '<div class="empty">没找到匹配「' + escapeHtml(q) + '」的邮件。</div>'; return; }
        res.innerHTML = '<div class="rcount">找到 ' + items.length + ' 封 · 点一条让助手讲讲</div>' +
          items.slice(0, 8).map(function (it) {
            return '<div class="ri" data-act="hdr-srch-ask" data-q="' + escapeHtml(it.title) + '">' +
              '<div class="rt">' + escapeHtml(it.title) + '</div>' +
              (it.sender ? '<div class="rmeta">' + escapeHtml(it.sender) + '</div>' : '') +
              '<div class="rs">' + escapeHtml(it.snippet) + '</div></div>';
          }).join('');
      })
      .catch(function () { res.innerHTML = '<div class="empty">搜索失败，稍后再试。</div>'; });
  }

  function toggleHdrPanel(kind) {
    var panel = document.getElementById('hdrPanel');
    if (!panel) return;
    if (state.hdrPanel === kind) { panel.className = 'dD-hdrpanel'; state.hdrPanel = null; return; }
    state.hdrPanel = kind;
    panel.innerHTML = kind === 'bell' ? headerNotifHtml() : headerSearchHtml();
    panel.className = 'dD-hdrpanel on';
    if (kind === 'search') {
      var input = document.getElementById('hdrSearchInput');
      if (input) {
        input.focus();
        input.addEventListener('keydown', function (e) { if (e.key === 'Enter') runHeaderSearch(input.value); });
      }
    }
  }

  function closeHdrPanel() {
    var panel = document.getElementById('hdrPanel');
    if (panel) panel.className = 'dD-hdrpanel';
    state.hdrPanel = null;
  }

  function welcome() {
    var today = new Date();
    appendDivider('今天 · ' + (today.getMonth() + 1) + '月' + today.getDate() + '日');
    var pending = reviewItems().length;
    botMessage(
      '<div class="dD-body">早上好。有 <b>' + pending +
      '</b> 条截止待加入日历，下面一条条确认。候选截止默认不进入日历，点「加入日历」后才会显示；外部写入永远先问你。金额/动作的邮件复核收在「更多」里。</div>' +
      dailyEmbed());
  }

  function handleDailyRun(button) {
    if (state.busy) return;
    state.busy = true;
    button.disabled = true;
    fetch('/api/daily/run', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (summary) {
        state.daily = summary;
        updateSummary();
        botMessage('<div class="dD-body">今日检查完成：<b>' +
          escapeHtml((summary.tasks || {}).queue_count || 0) + '</b> 条待处理，<b>' +
          escapeHtml((summary.calendar || {}).pending_count || 0) + '</b> 条本地日历草稿等待确认。</div>');
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">今日检查失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () {
        state.busy = false;
        button.disabled = false;
      });
  }

  function handleGmailSync(button) {
    if (state.busy) return;
    state.busy = true;
    button.disabled = true;
    botMessage('<div class="dD-body uncertain">正在触发 Gmail 外部只读同步。此操作会访问 Gmail API，但不会发送邮件或写外部日历；结果只落到本地证据库和 audit。</div>');
    fetch('/api/gmail/sync?confirm=1', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (result.daily_summary) state.daily = result.daily_summary;
        return refresh().then(function () {
          var summary = result.daily_summary || state.daily || {};
          if (result.error) {
            var failure = (result.diagnostics || {}).latest_failure || {};
            var readiness = (state.daily || {}).gmail_readiness || {};
            var command = (readiness.next_action || {}).command || '';
            var needsOauth = readiness.oauth_ready === false ||
              /credential|oauth|not configured|not available/i.test(String(result.error));
            botMessage('<div class="dD-body uncertain">Gmail 同步未完成：' +
              (needsOauth
                ? '还没配置 Google OAuth 凭证（读已存的本地邮件不需要它，只有重新同步才需要）。设置好下面这个环境变量再重启服务即可：'
                : escapeHtml(failure.category || result.error) + '。') +
              '未发生外部写入。' +
              (needsOauth && command ? '<div class="dD-command">' + escapeHtml(command) + '</div>' : '') +
              '</div>');
            return;
          }
          botMessage('<div class="dD-body">Gmail 只读同步完成：本地邮件 <b>' +
            escapeHtml(((summary.email || {}).stored_message_count) || 0) + '</b>，待处理任务 <b>' +
            escapeHtml(((summary.tasks || {}).queue_count) || 0) + '</b>。未发送邮件，未写外部日历。</div>');
        });
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">Gmail 同步请求失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () {
        state.busy = false;
        button.disabled = false;
      });
  }

  function handleConfirm(eventId, buttons) {
    if (state.busy) return;
    state.busy = true;
    var confirmationId = 'ui-' + eventId + '-' + Date.now();
    fetch('/api/calendar/sync?destination=ics&confirm=1&event_id=' + encodeURIComponent(eventId) +
      '&confirmation_id=' + encodeURIComponent(confirmationId), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (result.allowed) {
          showToast('已加入日历（本地 ICS）', { onUndo: function () { revertConfirm(eventId); } });
        } else {
          showToast('被确认门拦下了：' + (result.reason || '未知原因'));
        }
        buttons.remove();
        return refresh();
      })
      .then(offerNextSuggestion)
      .catch(function (err) { showToast('确认失败：' + err); })
      .finally(function () { state.busy = false; });
  }

  function handleIgnore(eventId, buttons) {
    if (state.busy) return;
    state.busy = true;
    fetch('/api/tasks/review?task_id=' + encodeURIComponent('calendar:' + eventId) +
      '&status=ignored&note=' + encodeURIComponent('dismissed from calendar assistant'), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function () {
        showToast('已忽略这条建议', { onUndo: undoLatestReview });
        buttons.remove();
        return refresh();
      })
      .then(offerNextSuggestion)
      .catch(function (err) { showToast('忽略失败：' + err); })
      .finally(function () { state.busy = false; });
  }

  function handleTaskReview(taskIds, status, buttons) {
    if (state.busy) return;
    var ids = (Array.isArray(taskIds) ? taskIds : [taskIds]).filter(Boolean);
    if (!ids.length) return;
    state.busy = true;
    buttons.querySelectorAll('button').forEach(function (button) { button.disabled = true; });
    var idParams = ids.map(function (id) { return 'task_id=' + encodeURIComponent(id); }).join('&');
    fetch('/api/tasks/review?' + idParams +
      '&status=' + encodeURIComponent(status) +
      '&note=' + encodeURIComponent('reviewed from calendar assistant: ' + status), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (result.error) throw new Error(result.error);
        showToast('已标记为「' + (REVIEW_STATUS_LABEL[status] || status) + '」', { onUndo: undoLatestReview });
        buttons.remove();
        return refresh();
      })
      .then(function () {
        advancePastTask(ids[0]);
        offerNextTaskSuggestion();
      })
      .catch(function (err) { showToast('任务状态更新失败：' + err); })
      .finally(function () { state.busy = false; });
  }

  function handleTaskBulkReview(status, button) {
    if (state.busy) return;
    var queue = filteredTaskQueue();
    if (!queue.length) {
      showToast('当前筛选下没有可批量处理的任务。');
      return;
    }
    var label = REVIEW_STATUS_LABEL[status] || status;
    showConfirm('将当前筛选下 ' + queue.length + ' 条任务批量标记为「' + label + '」？只写本地状态，不发邮件。', function () {
      state.busy = true;
      var wrap = button.closest('#taskBulkActions');
      if (wrap) wrap.querySelectorAll('button').forEach(function (btn) { btn.disabled = true; });
      var confirmationId = 'ui-task-bulk-' + Date.now();
      fetch('/api/tasks/review/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          task_ids: queue.map(function (task) { return task.task_id; }),
          status: status,
          note: 'bulk reviewed from calendar assistant: ' + status,
          confirm: true,
          confirmation_id: confirmationId,
          filter: { view: state.taskView, kind: state.taskFilterKind, status: state.taskFilterStatus, sort: state.taskSort }
        })
      })
        .then(function (r) { return r.json(); })
        .then(function (result) {
          if (result.error) throw new Error(result.error);
          if (!result.allowed) {
            showToast('批量操作被确认门拦下了：' + (result.reason || '未知原因'));
            return null;
          }
          showToast('已批量标记 ' + (result.reviewed_count || 0) + ' 条为「' + label + '」', { onUndo: undoLatestReview });
          state.taskCursor = 0;
          return refresh().then(offerNextTaskSuggestion);
        })
        .catch(function (err) { showToast('批量任务状态更新失败：' + err); })
        .finally(function () {
          state.busy = false;
          if (wrap) wrap.querySelectorAll('button').forEach(function (btn) { btn.disabled = false; });
        });
    });
  }

  function handleTaskEvidence(taskId, button) {
    if (state.busy) return;
    state.busy = true;
    button.disabled = true;
    fetch('/api/tasks/evidence?task_id=' + encodeURIComponent(taskId))
      .then(function (r) { return r.json(); })
      .then(function (payload) {
        if (payload.error) throw new Error(payload.error);
        botMessage(taskEvidenceEmbed(payload), { ghost: true });
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">证据展开失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () {
        state.busy = false;
        button.disabled = false;
      });
  }

  function handleTaskHistory(button) {
    if (state.busy) return;
    state.busy = true;
    button.disabled = true;
    fetch('/api/tasks/review/history?limit=8')
      .then(function (r) { return r.json(); })
      .then(function (payload) {
        if (payload.error) throw new Error(payload.error);
        botMessage(taskHistoryEmbed(payload), { ghost: true });
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">历史读取失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () {
        state.busy = false;
        button.disabled = false;
      });
  }

  // undo a "加入日历" from the history list — reverts the draft to a pending suggestion
  function handleCalendarUndoFromHistory(eventId, button) {
    if (state.busy || !eventId) return;
    state.busy = true;
    button.disabled = true;
    fetch('/api/calendar/unconfirm?event_id=' + encodeURIComponent(eventId), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (result.error) { showToast('退回失败：' + escapeHtml(result.error)); button.disabled = false; return null; }
        button.textContent = '已退回';
        state.taskCursor = 0;
        return refresh().then(function () { renderReviewCard(); showToast('已退回，恢复为待确认'); });
      })
      .catch(function (err) { showToast('退回失败：' + escapeHtml(err)); button.disabled = false; })
      .finally(function () { state.busy = false; });
  }

  function handleTaskUndo(auditId, button) {
    if (state.busy) return;
    showConfirm('撤销这条本地 review 操作？只恢复本地状态、写一条 audit，不发邮件、不写外部日历。', function () {
      state.busy = true;
      button.disabled = true;
      var confirmationId = 'ui-task-undo-' + auditId + '-' + Date.now();
      fetch('/api/tasks/review/undo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audit_id: Number(auditId), confirm: true, confirmation_id: confirmationId })
      })
        .then(function (r) { return r.json(); })
        .then(function (result) {
          if (result.error) throw new Error(result.error);
          if (!result.allowed) {
            botMessage('<div class="dD-body uncertain">撤销被确认门拦下了：' +
              escapeHtml(result.reason || '未知原因') + '</div>');
            return null;
          }
          botMessage('<div class="dD-body">已恢复 <b>' + escapeHtml(result.restored_count || 0) +
            '</b> 条任务的本地 review 状态。确认 ID <code>' + escapeHtml(confirmationId) +
            '</code> 已记录；没有外部副作用。</div>');
          state.taskCursor = 0;
          return refresh();
        })
        .then(function () {
          return fetch('/api/tasks/review/history?limit=8');
        })
        .then(function (r) { return r ? r.json() : null; })
        .then(function (payload) {
          if (payload) botMessage(taskHistoryEmbed(payload), { ghost: true });
        })
        .catch(function (err) { botMessage('<div class="dD-body uncertain">撤销失败：' + escapeHtml(err) + '</div>'); })
        .finally(function () {
          state.busy = false;
          button.disabled = false;
        });
    });
  }

  function answerCardsHtml(cards) {
    return '<div class="dD-anscards">' + cards.map(function (c) {
      var head = c.kind === 'deadline'
        ? '截止 · ' + escapeHtml(c.date || c.value || '')
        : (c.kind === 'email' ? '邮件证据' : escapeHtml(c.value || ''));
      var meta = [];
      if (c.sender) meta.push('发件人：' + c.sender);
      if (c.received) meta.push('收到：' + c.received);
      return '<div class="dD-anscard" data-anscard="1"' +
        ' data-title="' + escapeHtml(c.title || c.value || '') + '"' +
        ' data-meta="' + escapeHtml(meta.join(' · ')) + '"' +
        ' data-evidence="' + escapeHtml(c.evidence || '') + '"' +
        ' data-source="' + escapeHtml(c.source_id || '') + '">' +
        '<div class="d">' + head + '</div>' +
        '<div class="t">' + escapeHtml(c.title || c.value || '') + '</div>' +
        '</div>';
    }).join('') + '</div>';
  }

  // A "add this to my calendar" request comes back with metadata.proposed_event;
  // the model proposed the slots, the user confirms here, and only then do we write.
  // When the request referenced an email and several matched ("那封 Tripalink" — titled
  // vs. from), proposed_event.candidates carries the alternatives and we offer a picker.
  function proposeEventHtml(p, idx) {
    idx = idx || 0;
    var cands = p.candidates || [];
    var sel = cands[idx] || p;
    var title = sel.title || '', date = sel.date || '', start = sel.start_time || '', end = sel.end_time || '';
    var when = escapeHtml(date) + (start ? ' ' + escapeHtml(start) + (end ? '–' + escapeHtml(end) : '') : '');
    var sub = (cands.length > 1 && sel.subject) ? '<div class="dD-propose-sub">来自邮件：' +
      escapeHtml(sel.subject) + (sel.sender ? ' · ' + escapeHtml(sel.sender) : '') + '</div>' : '';
    var alt = cands.length > 1 ? '<button class="dD-cbtn sec" data-act="event-not-this">不是这个</button>' : '';
    return '<div class="dD-propose" data-propose="' + escapeHtml(JSON.stringify(p)) + '" data-idx="' + idx + '"' +
      ' data-title="' + escapeHtml(title) + '" data-date="' + escapeHtml(date) +
      '" data-start="' + escapeHtml(start) + '" data-end="' + escapeHtml(end) + '">' +
      '<div class="dD-propose-h">📅 待确认事件</div>' +
      '<div class="dD-propose-t">' + escapeHtml(title) + '</div>' +
      '<div class="dD-propose-d">' + when + '</div>' + sub +
      '<div class="dD-btns">' +
      '<button class="dD-cbtn prim" data-act="confirm-event">✓ 确认加入日历</button>' +
      alt +
      '<button class="dD-cbtn sec" data-act="cancel-event">取消</button>' +
      '</div></div>';
  }

  function proposeEventPickerHtml(p) {
    var rows = (p.candidates || []).map(function (c, i) {
      var label = (c.subject || c.title || '') + ' · ' + (c.date || '') + (c.sender ? ' · ' + c.sender : '');
      return '<button class="dD-cbtn sec dD-pickrow" data-act="event-pick" data-pick="' + i + '">' +
        escapeHtml(label) + '</button>';
    }).join('');
    return '<div class="dD-propose" data-propose="' + escapeHtml(JSON.stringify(p)) + '">' +
      '<div class="dD-propose-h">你指的是哪封邮件？</div>' +
      '<div class="dD-btns dD-picker">' + rows +
        '<button class="dD-cbtn sec" data-act="cancel-event">取消</button></div></div>';
  }

  function eventNotThis(btn) {
    var card = btn.closest('.dD-propose');
    if (!card) return;
    card.outerHTML = proposeEventPickerHtml(JSON.parse(card.dataset.propose || '{}'));
  }

  function eventPick(btn) {
    var card = btn.closest('.dD-propose');
    if (!card) return;
    card.outerHTML = proposeEventHtml(JSON.parse(card.dataset.propose || '{}'), parseInt(btn.dataset.pick || '0', 10));
  }

  function confirmProposedEvent(btn) {
    if (state.busy) return;
    var card = btn.closest('.dD-propose');
    if (!card) return;
    var title = card.dataset.title || '', date = card.dataset.date || '';
    if (!title || !date) return;
    var start = card.dataset.start || '', end = card.dataset.end || '';
    state.busy = true;
    fetch('/api/calendar/create?title=' + encodeURIComponent(title) + '&date=' + encodeURIComponent(date) +
      '&start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.error) { showToast('加入失败：' + escapeHtml(res.error)); return; }
        card.classList.add('done');
        var btns = card.querySelector('.dD-btns');
        if (btns) btns.innerHTML = '<span class="dD-propose-ok">✓ 已加入日历</span>';
        showToast('已加入「' + title + '」');
        return refresh();
      })
      .catch(function (err) { showToast('加入失败：' + escapeHtml(err)); })
      .finally(function () { state.busy = false; });
  }

  function cancelProposedEvent(btn) {
    var card = btn.closest('.dD-propose');
    if (!card) return;
    var btns = card.querySelector('.dD-btns');
    if (btns) btns.innerHTML = '<span class="dD-propose-cancel">已取消</span>';
  }

  // ---- edit / delete an existing event from chat (top-1, with a top-3 fallback) ----
  function changeDesc(action, target, changes) {
    var when = (target.date || '') + (target.start_time ? ' ' + target.start_time : '');
    if (action === 'delete') return when + ' · 删除';
    var parts = [];
    if (changes.date) parts.push('日期→' + changes.date);
    if (changes.start_time) parts.push('时间→' + changes.start_time + (changes.end_time ? '–' + changes.end_time : ''));
    if (changes.title) parts.push('标题→' + changes.title);
    return when + ' · 改为 ' + parts.join('，');
  }

  function proposeChangeHtml(change, idx) {
    idx = idx || 0;
    var cands = change.candidates || [];
    var target = cands[idx] || change.target;
    var isDel = change.action === 'delete';
    var alt = cands.length > 1 ? '<button class="dD-cbtn sec" data-act="change-not-this">不是这个</button>' : '';
    return '<div class="dD-propose" data-change="' + escapeHtml(JSON.stringify(change)) + '" data-idx="' + idx + '">' +
      '<div class="dD-propose-h">' + (isDel ? '🗑 待确认删除' : '✏️ 待确认修改') + '</div>' +
      '<div class="dD-propose-t">' + escapeHtml(target.title || '') + '</div>' +
      '<div class="dD-propose-d">' + escapeHtml(changeDesc(change.action, target, change.changes || {})) + '</div>' +
      '<div class="dD-btns">' +
        '<button class="dD-cbtn prim" data-act="confirm-change">✓ 确认' + (isDel ? '删除' : '修改') + '</button>' +
        alt +
        '<button class="dD-cbtn sec" data-act="cancel-event">取消</button>' +
      '</div></div>';
  }

  function proposeChangePickerHtml(change) {
    var rows = (change.candidates || []).map(function (c, i) {
      return '<button class="dD-cbtn sec dD-pickrow" data-act="change-pick" data-pick="' + i + '">' +
        escapeHtml(c.title || '') + ' · ' + escapeHtml(c.date || '') + '</button>';
    }).join('');
    return '<div class="dD-propose" data-change="' + escapeHtml(JSON.stringify(change)) + '">' +
      '<div class="dD-propose-h">你指的是哪一个？</div>' +
      '<div class="dD-btns dD-picker">' + rows +
        '<button class="dD-cbtn sec" data-act="cancel-event">取消</button></div></div>';
  }

  function changeNotThis(btn) {
    var card = btn.closest('.dD-propose');
    if (!card) return;
    card.outerHTML = proposeChangePickerHtml(JSON.parse(card.dataset.change || '{}'));
  }

  function changePick(btn) {
    var card = btn.closest('.dD-propose');
    if (!card) return;
    card.outerHTML = proposeChangeHtml(JSON.parse(card.dataset.change || '{}'), parseInt(btn.dataset.pick || '0', 10));
  }

  function confirmChange(btn) {
    if (state.busy) return;
    var card = btn.closest('.dD-propose');
    if (!card) return;
    var change = JSON.parse(card.dataset.change || '{}');
    var idx = parseInt(card.dataset.idx || '0', 10);
    var target = (change.candidates || [])[idx] || change.target;
    if (!target || !target.event_id) return;
    var isDel = change.action === 'delete';
    var url;
    if (isDel) {
      url = '/api/calendar/delete?event_id=' + encodeURIComponent(target.event_id);
    } else {
      var c = change.changes || {};
      url = '/api/calendar/drafts/update?event_id=' + encodeURIComponent(target.event_id) + '&user=1';
      if (c.date) url += '&date=' + encodeURIComponent(c.date);
      if (c.start_time) url += '&start=' + encodeURIComponent(c.start_time);
      if (c.end_time) url += '&end=' + encodeURIComponent(c.end_time);
      if (c.title) url += '&title=' + encodeURIComponent(c.title);
    }
    state.busy = true;
    fetch(url, { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.error) { showToast((isDel ? '删除' : '修改') + '失败：' + escapeHtml(res.error)); return; }
        card.classList.add('done');
        var btns = card.querySelector('.dD-btns');
        if (btns) btns.innerHTML = '<span class="dD-propose-ok">✓ 已' + (isDel ? '删除' : '修改') + '</span>';
        showToast('已' + (isDel ? '删除' : '修改') + '「' + (target.title || '') + '」');
        return refresh();
      })
      .catch(function (err) { showToast('操作失败：' + escapeHtml(err)); })
      .finally(function () { state.busy = false; });
  }

  function anscardPopupEl() {
    var el = document.getElementById('anscardPopup');
    if (!el) {
      el = document.createElement('div');
      el.id = 'anscardPopup';
      document.body.appendChild(el);
    }
    return el;
  }

  function showAnscardPopup(card) {
    var el = anscardPopupEl();
    var meta = card.getAttribute('data-meta') || '';
    var evidence = card.getAttribute('data-evidence') || '';
    var source = card.getAttribute('data-source') || '';
    el.innerHTML =
      '<div class="pt">' + escapeHtml(card.getAttribute('data-title') || '') + '</div>' +
      (meta ? '<div class="m">' + escapeHtml(meta) + '</div>' : '') +
      (evidence ? '<div class="ev">' + escapeHtml(evidence) + '</div>' : '') +
      (source ? '<div class="s">来源 · <span class="dD-cite">' + escapeHtml(source) + '</span></div>' : '');
    el.style.display = 'block';
    var r = card.getBoundingClientRect();
    var w = el.offsetWidth || 330;
    var h = el.offsetHeight || 120;
    // prefer left of the card (the chat panel is on the right); fall back to below
    var left = r.left - w - 10;
    if (left < 8) left = Math.min(r.left, window.innerWidth - w - 8);
    var top = Math.max(8, Math.min(r.top, window.innerHeight - h - 8));
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  }

  function hideAnscardPopup() {
    var el = document.getElementById('anscardPopup');
    if (el) el.style.display = 'none';
  }

  var askHistory = [];  // recent {question, intent, answer} turns; server budgets/compacts them

  function askAssistant(question) {
    userMessage(question);
    fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question, history: askHistory.slice(-12) })
    })
      .then(function (r) { return r.json(); })
      .then(function (answer) {
        if (answer.error) {
          botMessage('<div class="dD-body uncertain">' + escapeHtml(answer.error) + '</div>');
          return;
        }
        askHistory.push({ question: question, intent: answer.intent || '', answer: String(answer.answer || '') });
        if (askHistory.length > 20) askHistory = askHistory.slice(-20);
        var cards = answer.metadata && answer.metadata.cards;
        var hasCards = cards && cards.length;
        // When we have structured cards, the answer text's first line is the
        // headline (e.g. "Upcoming on your plate:") and the cards carry the
        // detail — so we don't repeat the list as plain text.
        var bodyText = hasCards ? String(answer.answer || '').split('\n')[0] : answer.answer;
        var html = '<div class="dD-body' + (answer.uncertain ? ' uncertain' : '') + '">' + escapeHtml(bodyText) + '</div>';
        if (hasCards) {
          html += answerCardsHtml(cards);
        } else if (answer.citations && answer.citations.length) {
          html += '<div class="dD-cites">' + answer.citations.map(function (c) {
            return '<span class="dD-cite" title="' + escapeHtml(c.evidence || '') + '">' + escapeHtml(c.source_id) + '</span>';
          }).join('') + '</div>';
        }
        var proposed = answer.metadata && answer.metadata.proposed_event;
        if (proposed && proposed.title && proposed.date) html += proposeEventHtml(proposed);
        var change = answer.metadata && answer.metadata.proposed_change;
        if (change && change.target) html += proposeChangeHtml(change);
        botMessage(html);
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">请求失败：' + escapeHtml(err) + '</div>'); });
  }

  // ---------- events ----------
  document.getElementById('calSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-view]');
    if (!btn) return;
    state.view = btn.dataset.view;
    renderCalendar();
  });
  document.getElementById('calBody').addEventListener('click', function (e) {
    if (e.target.closest('[data-act="toggle-allday"]')) {
      state.alldayExpanded = !state.alldayExpanded;
      renderCalendar();
      return;
    }
    var evHit = e.target.closest('[data-event-id]');
    if (evHit) {
      var item = getEventById(evHit.dataset.eventId);
      if (item) openEventPopup(item);
      return;
    }
    var dayHit = e.target.closest('[data-day-key]');
    if (dayHit) { openDayPopup(dayHit.dataset.dayKey); return; }
    // click empty space on a day → create a new event there (Google/Apple style)
    var newDayHit = e.target.closest('[data-new-day]');
    if (newDayHit) {
      var prefill = { date: newDayHit.dataset.newDay };
      if (newDayHit.classList.contains('tg-col')) {
        var y = e.clientY - newDayHit.getBoundingClientRect().top;
        var hour = Math.floor((y - 12) / HPX) + START_H;  // PAD = 12
        if (hour >= 0 && hour <= 23) prefill.start = String(hour).padStart(2, '0') + ':00';
      }
      openCreateEventPopup(prefill);
      return;
    }
  });
  document.getElementById('calNewEvent').addEventListener('click', function () { openCreateEventPopup(); });
  document.getElementById('calPrev').addEventListener('click', function () { step(-1); });
  document.getElementById('calNext').addEventListener('click', function () { step(1); });
  function step(dir) {
    var c = state.cursor;
    if (state.view === 'month') state.cursor = new Date(c.getFullYear(), c.getMonth() + dir, 1);
    else if (state.view === 'week') state.cursor = addDays(c, 7 * dir);
    else if (state.view === 'day') state.cursor = addDays(c, dir);
    else return;
    renderCalendar();
  }
  feed.addEventListener('mouseover', function (e) {
    var card = e.target.closest('[data-anscard]');
    if (card) showAnscardPopup(card);
  });
  feed.addEventListener('mouseout', function (e) {
    var card = e.target.closest('[data-anscard]');
    if (card && !card.contains(e.relatedTarget)) hideAnscardPopup();
  });
  feed.addEventListener('scroll', hideAnscardPopup, true);
  feed.addEventListener('click', function (e) {
    var calendarEvidenceHit = e.target.closest('[data-act="calendar-evidence"]');
    if (calendarEvidenceHit) {
      var owner = calendarEvidenceHit.closest('[data-event-id]');
      var calendarEvidenceId = calendarEvidenceHit.dataset.eventId || (owner && owner.dataset.eventId) || '';
      if (calendarEvidenceId) openCalendarEvidence(calendarEvidenceId);
      return;
    }
    // the whole task card is tappable → open its email evidence (same as 查看证据)
    var taskCardHit = e.target.closest('[data-act="task-card"]');
    if (taskCardHit && taskCardHit.dataset.taskId) {
      handleTaskEvidence(taskCardHit.dataset.taskId, taskCardHit);
      return;
    }
    var btn = e.target.closest('button[data-act]');
    if (!btn) return;
    if (btn.dataset.act === 'toggle-adv') {
      state.advOpen = !state.advOpen;
      var adv = document.getElementById('advBlock');
      if (adv) adv.style.display = state.advOpen ? '' : 'none';
      btn.textContent = state.advOpen ? '收起详情 ▴' : '更多 · 今日检查/Gmail/批量操作 ▾';
      return;
    }
    if (btn.dataset.act === 'daily-run') {
      handleDailyRun(btn);
      return;
    }
    if (btn.dataset.act === 'gmail-sync') {
      handleGmailSync(btn);
      return;
    }
    if (btn.dataset.act === 'task-group') {
      handleTaskGroup(btn.dataset.group || 'all');
      return;
    }
    if (btn.dataset.act === 'task-view') {
      handleTaskView(btn.dataset.view || 'all');
      return;
    }
    if (btn.dataset.act === 'task-prev') {
      moveTaskCursor(-1);
      return;
    }
    if (btn.dataset.act === 'task-next') {
      moveTaskCursor(1);
      return;
    }
    if (btn.dataset.act === 'email-prev') {
      moveEmailCursor(-1);
      return;
    }
    if (btn.dataset.act === 'email-next') {
      moveEmailCursor(1);
      return;
    }
    if (btn.dataset.act === 'show-task') {
      offerNextTaskSuggestion({ scroll: true });
      return;
    }
    if (btn.dataset.act === 'task-history') {
      handleTaskHistory(btn);
      return;
    }
    if (btn.dataset.act === 'task-undo') {
      handleTaskUndo(btn.dataset.auditId || '', btn);
      return;
    }
    if (btn.dataset.act === 'cal-undo') {
      handleCalendarUndoFromHistory(btn.dataset.eventId || '', btn);
      return;
    }
    var bulkStatus = TASK_BULK_ACTION_STATUS[btn.dataset.act];
    if (bulkStatus) {
      handleTaskBulkReview(bulkStatus, btn);
      return;
    }
    var reviewStatus = TASK_ACTION_STATUS[btn.dataset.act];
    if (reviewStatus) {
      var taskWrap = btn.closest('.dD-btns');
      var ids = ((taskWrap && (taskWrap.dataset.taskIds || taskWrap.dataset.taskId)) || '')
        .split(',').filter(Boolean);
      if (ids.length) handleTaskReview(ids, reviewStatus, taskWrap);
      return;
    }
    if (btn.dataset.act === 'task-evidence') {
      var evidenceWrap = btn.closest('.dD-btns');
      if (evidenceWrap && evidenceWrap.dataset.taskId) handleTaskEvidence(evidenceWrap.dataset.taskId, btn);
      return;
    }
    if (btn.dataset.act === 'confirm-event') { confirmProposedEvent(btn); return; }
    if (btn.dataset.act === 'cancel-event') { cancelProposedEvent(btn); return; }
    if (btn.dataset.act === 'event-not-this') { eventNotThis(btn); return; }
    if (btn.dataset.act === 'event-pick') { eventPick(btn); return; }
    if (btn.dataset.act === 'confirm-change') { confirmChange(btn); return; }
    if (btn.dataset.act === 'change-not-this') { changeNotThis(btn); return; }
    if (btn.dataset.act === 'change-pick') { changePick(btn); return; }
    var wrap = btn.closest('.dD-btns');
    var eventId = wrap.dataset.eventId;
    state.queue = state.queue.filter(function (item) { return item.eventId !== eventId; });
    if (btn.dataset.act === 'confirm') handleConfirm(eventId, wrap);
    else handleIgnore(eventId, wrap);
  });
  document.getElementById('aiInput').addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var text = e.target.value.trim();
    if (!text) return;
    e.target.value = '';
    askAssistant(text);
  });

  // header bell / search icons + the panel's own clicks
  document.querySelector('.dD-chh .icons').addEventListener('click', function (e) {
    var hit = e.target.closest('[data-act]');
    if (!hit) return;
    if (hit.dataset.act === 'hdr-bell') toggleHdrPanel('bell');
    else if (hit.dataset.act === 'hdr-search') toggleHdrPanel('search');
  });
  document.getElementById('hdrPanel').addEventListener('click', function (e) {
    var goto = e.target.closest('[data-act="hdr-goto"]');
    if (goto) {
      if (goto.dataset.group) handleTaskGroup(goto.dataset.group);
      closeHdrPanel();
      var slot = document.getElementById('taskCardSlot');
      if (slot) slot.scrollIntoView({ block: 'nearest' });
      return;
    }
    var dl = e.target.closest('[data-act="hdr-deadline"]');
    if (dl && dl.dataset.key) {
      closeHdrPanel();
      var onBoard = state.events.some(function (it) { return it.dateKey === dl.dataset.key; });
      if (onBoard) {
        openDayPopup(dl.dataset.key);  // a confirmed event — show that day
      } else {
        handleTaskGroup('unread');     // a pending candidate — send to the review queue to confirm
        var slot2 = document.getElementById('taskCardSlot');
        if (slot2) slot2.scrollIntoView({ block: 'nearest' });
      }
      return;
    }
    var ask = e.target.closest('[data-act="hdr-srch-ask"]');
    if (ask && ask.dataset.q) { closeHdrPanel(); askAssistant('「' + ask.dataset.q + '」这封邮件说了什么？'); return; }
  });
  // click anywhere outside the panel/icons closes it
  document.addEventListener('click', function (e) {
    if (!state.hdrPanel) return;
    if (e.target.closest('#hdrPanel') || e.target.closest('.dD-chh .icons [data-act]')) return;
    closeHdrPanel();
  });

  function refresh() {
    return loadData().then(function () {
      renderCalendar();
      updateSummary();
    });
  }

  // ---------- boot ----------
  refresh().then(welcome).catch(function (err) {
    document.getElementById('calBody').innerHTML =
      '<div class="dD-empty">加载失败：' + escapeHtml(err) + '</div>';
  });
  // keep the now line honest without re-fetching
  setInterval(function () {
    if (state.view === 'week' || state.view === 'day') renderCalendar();
  }, 60000);
})();
</script>
</body>
