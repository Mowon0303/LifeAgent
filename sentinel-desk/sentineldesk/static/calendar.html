<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LifeAgent · 日历 AI 助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background:#EFE9DC; }

  .dD { width:100%; height:100vh; min-width:1100px; display:flex; background:#EFE9DC;
    font-family:'IBM Plex Sans',sans-serif; color:#2B2622; }

  /* ---- calendar (B template, warm) ---- */
  .dD-cal { flex:1; display:flex; flex-direction:column; padding:30px 32px; min-width:0; }
  .dD-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .dD-tl { display:flex; align-items:center; gap:18px; }
  .dD-title { font-family:'Newsreader',serif; font-size:42px; font-weight:500; letter-spacing:-.5px; line-height:1; }
  .dD-title em { font-style:normal; color:#A2937B; font-weight:400; font-size:24px; }
  .dD-nav { display:flex; gap:6px; }
  .dD-nav button { width:38px; height:38px; border-radius:11px; border:1px solid #E0D6C4; background:#FBF8F1; color:#5C5446;
    font-size:17px; cursor:pointer; }
  .dD-nav button:hover { background:#EDE5D6; }
  .dD-newev { height:38px; padding:0 16px; border-radius:11px; border:0; background:#2A6FDB; color:#fff; font-size:13.5px;
    font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 2px 6px rgba(42,111,219,.25); }
  .dD-newev:hover { background:#2461c2; }
  .tg-ev { position:absolute; left:4px; right:6px; border-radius:7px; padding:3px 7px; font-size:11px; font-weight:600;
    overflow:hidden; cursor:pointer; box-shadow:0 1px 3px rgba(40,30,15,.14); line-height:1.25; z-index:3; }
  .tg-ev:hover { filter:brightness(.97); }
  .ev-time { display:flex; align-items:center; gap:8px; }
  .ev-time input { flex:1; }
  .ev-hint { font-size:11.5px; color:#9A8E7B; }
  .dD-seg { display:flex; background:#EBE2D2; border-radius:13px; padding:4px; gap:3px; }
  .dD-seg button { border:0; background:transparent; color:#8A7F6D; padding:9px 18px; border-radius:9px;
    font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .dD-seg button.on { background:#2A6FDB; color:#fff; box-shadow:0 2px 6px rgba(42,111,219,.25); }
  .dD-week { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:10px; }
  .dD-week span { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.1em; color:#A2937B; text-transform:uppercase; }
  .dD-grid { flex:1; display:grid; grid-template-columns:repeat(7,1fr); gap:10px; min-height:0; }
  .dD-cell { background:#FBF8F1; border-radius:14px; padding:9px 9px 7px; display:flex; flex-direction:column; gap:4px;
    min-height:0; overflow:hidden; box-shadow:0 1px 2px rgba(80,60,20,.04); }
  .dD-cell.out { background:rgba(251,248,241,.45); }
  .dD-cell.today { box-shadow:0 0 0 2px #2A6FDB, 0 6px 16px rgba(42,111,219,.16); }
  .dD-cell.has-events { cursor:pointer; }
  .dD-dn { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:#6B6253; flex:none; }
  .dD-cell.out .dD-dn { color:#C2B6A0; }
  .dD-cell.today .dD-dn { color:#2A6FDB; }
  /* chips take the remaining height and clip cleanly; "+N more" is pinned below so it is never cut off */
  .dD-cellchips { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; gap:4px; }
  .dD-blk { border-radius:7px; padding:3px 8px; font-size:11px; font-weight:600; line-height:1.25; flex:none;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .dD-blk .tm { font-weight:700; opacity:.7; margin-right:5px; }
  .dD-blk:hover { filter:brightness(.96); }
  .dD-blk.pending { border-style:solid; }
  .dD-more { font-size:10.5px; font-weight:700; color:#9A7B53; padding:1px 2px; flex:none; cursor:pointer; border-radius:5px; }
  .dD-more:hover { background:#EFE7D8; color:#6B6253; }

  /* ---- week / day time grid ---- */
  .dD-tg { flex:1; display:flex; flex-direction:column; min-height:0; }
  .dD-tg-head { display:grid; }
  .wk-dh { text-align:center; padding:2px 0 12px; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0; }
  .wk-dh .wd { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#A2937B; }
  .wk-dh .dnum { font-family:'Newsreader',serif; font-size:24px; font-weight:500; color:#3A352D; line-height:1; }
  .wk-dh.is-today .wd { color:#2A6FDB; }
  .wk-dh.is-today .dnum { color:#fff; background:#2A6FDB; width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:19px; box-shadow:0 4px 10px rgba(42,111,219,.3); }
  .dD-allday { display:grid; border-top:1px solid #E4DBC9; border-bottom:1px solid #E4DBC9; min-height:36px; flex:none; }
  .adg-lab { font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
    color:#B3A893; padding-right:8px; align-self:center; display:flex; align-items:center; justify-content:flex-end; }
  .adg-cell { padding:5px; display:flex; flex-direction:column; gap:3px; border-left:1px solid #ECE3D2; min-width:0; overflow:hidden; }
  .ad-chip { border-radius:6px; padding:3px 8px; font-size:11.5px; font-weight:600; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ad-chip.pending { border-style:solid; }
  .dD-tg-body { display:grid; overflow:auto; position:relative; }
  .tg-gutter { position:relative; }
  .tg-hr { position:absolute; right:9px; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
    color:#9A8E7B; transform:translateY(-50%); white-space:nowrap; }
  .tg-col { position:relative; border-left:1px solid #DDD2BE; min-width:0; }
  .tg-col .ln { position:absolute; left:0; right:0; border-top:1px solid #DAD0BC; }
  .tg-gutter .gln { position:absolute; right:0; width:6px; border-top:1px solid #DAD0BC; }
  .tg-now { position:absolute; left:0; right:0; height:0; border-top:2px solid #B14228; z-index:5; }
  .tg-now:before { content:''; position:absolute; left:-4px; top:-5px; width:9px; height:9px; border-radius:50%; background:#B14228; }

  /* ---- agenda ---- */
  .dD-ag { flex:1; overflow:auto; padding-right:4px; }
  .ag-day { display:grid; grid-template-columns:108px 1fr; gap:22px; padding:15px 0; border-top:1px solid #E4DBC9; }
  .ag-day:first-child { border-top:0; padding-top:6px; }
  .ag-dl { padding-top:2px; }
  .ag-dl .dow { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#A2937B; }
  .ag-dl .dd { font-family:'Newsreader',serif; font-size:30px; font-weight:500; color:#3A352D; line-height:1; margin-top:5px; }
  .ag-dl.today .dd { color:#2A6FDB; }
  .ag-dl .rel { font-size:11px; color:#B3A893; margin-top:7px; }
  .ag-rows { display:flex; flex-direction:column; gap:8px; }
  .ag-row { display:flex; align-items:center; gap:13px; background:#FBF8F1; border-radius:11px; padding:11px 15px;
    box-shadow:0 1px 2px rgba(80,60,20,.05); cursor:pointer; border-left:3px solid transparent; }
  .ag-row:hover { filter:brightness(.98); }
  .ag-row.pending { box-shadow:0 1px 2px rgba(80,60,20,.05); }
  .ag-time { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:#6B6253; min-width:50px; }
  .ag-dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .ag-ttl { font-size:15px; font-weight:600; color:#2B2622; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ag-chip { font-size:10.5px; font-weight:700; border-radius:5px; padding:2px 8px; white-space:nowrap; }
  .ag-src { font-size:11.5px; color:#A89A86; min-width:88px; text-align:right; white-space:nowrap; }
  .dD-empty { color:#A2937B; font-size:13px; padding:26px 4px; }

  /* ---- Discord-style agent panel ---- */
  .dD-ai { width:438px; flex:none; background:#F1ECE1; border-left:1px solid #E0D6C4; display:flex; flex-direction:column; position:relative; }
  .dD-chh { height:56px; flex:none; display:flex; align-items:center; gap:9px; padding:0 16px;
    border-bottom:1px solid #E4DBC9; box-shadow:0 1px 0 rgba(80,60,20,.03); }
  .dD-chh .hash { font-size:22px; color:#B3A893; font-weight:500; flex:none; }
  .dD-chh .cn { font-size:15px; font-weight:700; color:#2B2622; white-space:nowrap; flex:none; }
  .dD-chh .sep { width:1px; height:20px; background:#E0D6C4; margin:0 4px; flex:none; }
  .dD-chh .topic { font-size:12px; color:#9A8E7B; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto; min-width:0; }
  .dD-chh .icons { margin-left:auto; display:flex; gap:14px; color:#A89A86; flex:none; }
  .dD-chh .icons i { width:18px; height:18px; display:block; opacity:.8; cursor:pointer; position:relative; }
  .dD-chh .icons i:hover { opacity:1; }
  .dD-chh .icons .badge { position:absolute; top:-5px; right:-6px; min-width:9px; height:14px; line-height:14px; padding:0 3px;
    background:#B14228; color:#fff; font-size:9px; font-weight:700; border-radius:7px; text-align:center; display:none; }
  .dD-chh .icons .badge.on { display:block; }
  .dD-hdrpanel { position:absolute; top:52px; right:12px; width:308px; max-height:62vh; overflow:auto; background:#FFFDF8;
    border:1px solid #E0D6C4; border-radius:12px; box-shadow:0 12px 32px rgba(40,30,15,.18); z-index:55; padding:12px 13px; display:none; }
  .dD-hdrpanel.on { display:block; }
  .dD-hdrpanel h5 { margin:0 0 6px; font-size:11px; font-weight:700; color:#8A6D3B; text-transform:uppercase; letter-spacing:.05em; }
  .dD-hdrpanel .nrow { display:flex; gap:9px; align-items:flex-start; padding:8px 0; border-top:1px solid #F0E8D8; }
  .dD-hdrpanel .nrow:first-of-type { border-top:none; }
  .dD-hdrpanel .nrow.tap { cursor:pointer; }
  .dD-hdrpanel .nrow.tap:hover { background:#FBF6EC; }
  .dD-hdrpanel .nrow .nn { font-family:'IBM Plex Mono',monospace; font-weight:700; color:#B14228; font-size:14px; min-width:22px; }
  .dD-hdrpanel .nrow .nt { font-size:12.5px; color:#2B2622; line-height:1.4; }
  .dD-hdrpanel .empty { font-size:12.5px; color:#9A8E7B; padding:4px 0; }
  .dD-hdrsearch input { width:100%; box-sizing:border-box; border:1px solid #E0D6C4; border-radius:8px; padding:8px 10px; font-family:inherit; font-size:13px; background:#fff; color:#2B2622; }
  .dD-hdrsearch input:focus { outline:none; border-color:#B49A6A; }
  .dD-hdrsearch .res { margin-top:6px; }
  .dD-hdrsearch .ri { padding:8px 0; border-top:1px solid #F0E8D8; cursor:pointer; }
  .dD-hdrsearch .ri:hover { background:#FBF6EC; }
  .dD-hdrsearch .ri .rt { font-size:12.5px; font-weight:600; color:#2B2622; line-height:1.35; }
  .dD-hdrsearch .ri .rs { font-size:11.5px; color:#9A8E7B; line-height:1.35; margin-top:2px; }
  .dD-hdrsearch .ri .rmeta { font-size:11px; color:#B49A6A; margin-top:1px; }
  .dD-hdrsearch .rcount { font-size:11px; color:#9A8E7B; margin:2px 0 5px; }
  .dD-hdrpanel h5.sub { margin-top:10px; }

  .dD-feed { flex:1; overflow-y:auto; padding:14px 0 8px; display:flex; flex-direction:column; }
  .dD-div { display:flex; align-items:center; gap:10px; padding:6px 16px 14px; }
  .dD-div .ln { flex:1; height:1px; background:#E4DBC9; }
  .dD-div .pill { font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; color:#A89A86; }

  .dD-msg { display:grid; grid-template-columns:40px 1fr; gap:14px; padding:8px 16px; position:relative; }
  .dD-msg:hover { background:rgba(80,60,20,.035); }
  .dD-msg.right { grid-template-columns:1fr 40px; }
  .dD-msg.right .dD-av { grid-column:2; grid-row:1; }
  .dD-msg.right .dD-mc { grid-column:1; grid-row:1; text-align:right; }
  .dD-msg.right .dD-hl { justify-content:flex-end; }
  .dD-msg.right .dD-body { text-align:right; }
  .dD-av { width:40px; height:40px; border-radius:50%; flex:none; }
  .dD-av.bot { background:radial-gradient(circle at 34% 30%,#5B92F0,#2A6FDB 70%); position:relative; }
  .dD-av.bot:before { content:''; position:absolute; inset:11px; border:2px solid #fff; border-radius:3px; border-top-width:5px; }
  .dD-av.me { background:#4F7A4A; color:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; }
  .dD-av.ghost { visibility:hidden; }
  .dD-hl { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
  .dD-un { font-weight:700; font-size:15px; }
  .dD-un.bot { color:#2A6FDB; }
  .dD-un.me { color:#4F7A4A; }
  .dD-app { font-size:10px; font-weight:700; color:#fff; background:#2A6FDB; border-radius:4px; padding:1px 5px; letter-spacing:.02em;
    position:relative; top:-1px; }
  .dD-ts { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#B3A893; }
  .dD-body { font-size:14.5px; line-height:1.5; color:#393429; overflow-wrap:break-word; }
  .dD-body.uncertain { border-left:3px solid #B14228; padding-left:9px; }

  /* embeds */
  .dD-embed { border-left:4px solid #2A6FDB; background:#FBF8F1; border-radius:6px; padding:13px 16px; margin-top:8px;
    box-shadow:0 1px 2px rgba(80,60,20,.05); max-width:340px; }
  .dD-embed h4 { font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    color:#A89A86; margin:0 0 10px; }
  .dD-sumrow { display:flex; gap:12px; align-items:flex-start; padding:7px 0; border-top:1px solid #F1EADB; }
  .dD-sumrow:first-of-type { border-top:0; }
  .dD-sumrow .n { font-family:'Newsreader',serif; font-size:22px; line-height:1; min-width:26px; color:#2B2622; }
  .dD-sumrow .n.u { color:#B14228; }
  .dD-sumrow .lab { font-size:13.5px; font-weight:600; color:#2B2622; }
  .dD-sumrow .sub { font-size:12px; color:#9A8E7B; margin-top:1px; }
  .dD-embed.ev { border-left-color:#6A5BD0; }
  .dD-embed.daily { border-left-color:#4F7A4A; }
  .dD-embed.task { border-left-color:#B14228; }
  .dD-embed.session { border-left-color:#6A5BD0; }
  .dD-embed.receipt { border-left-color:#C47A30; }
  .dD-embed.gmail { border-left-color:#2A6FDB; }
  .dD-embed.cal-source-card { cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; }
  .dD-embed.cal-source-card:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(80,60,20,.10); }
  .dD-embed .etitle { font-size:15px; font-weight:700; color:#2B2622; display:flex; align-items:center; gap:8px; }
  .dD-embed .etitle .pin { width:8px; height:8px; border-radius:50%; background:#6A5BD0; flex:none; }
  .dD-embed .ewhen { font-family:'IBM Plex Mono',monospace; font-size:12px; color:#6A5BD0; margin:7px 0 1px; }
  .dD-embed .ddl-line { display:flex; align-items:baseline; gap:8px; margin:8px 0 3px; font-size:12.5px; color:#5C5446; }
  .dD-embed .ddl-label { color:#B14228; font-size:11px; font-weight:700; white-space:nowrap; }
  .dD-embed .ddl-date { font-family:'IBM Plex Mono',monospace; font-size:13px; color:#2B2622; }
  .dD-embed .esrc { font-size:11.5px; color:#A89A86; }
  .dD-embed .enote { font-size:13.5px; color:#5A5247; line-height:1.5; margin-top:9px; }
  .dD-taskline { font-size:11.5px; color:#9A8E7B; line-height:1.35; border-top:1px solid #F1EADB; padding-top:9px; margin-top:3px; }
  .dD-session-note { font-size:12px; color:#7A705F; line-height:1.45; border-top:1px solid #F1EADB; margin-top:7px; padding-top:8px; }
  .dD-command { font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5C5446; background:#EFE7D8; border-radius:6px;
    padding:7px 8px; margin-top:8px; overflow-wrap:anywhere; }
  .dD-session-next { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .dD-session-next button { border:1px solid transparent; background:#EAE6FA; color:#5C4DB8; border-radius:7px;
    height:27px; padding:0 9px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  .dD-empty.compact { padding:8px 0 0; line-height:1.45; }
  .dD-filterbar { display:flex; flex-wrap:wrap; gap:5px; max-width:340px; margin-top:8px; }
  .dD-filterbar button { border:1px solid transparent; background:#EFE7D8; color:#6B6253; border-radius:7px;
    height:27px; padding:0 9px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  .dD-filterbar button.on { background:#2A6FDB; border-color:#2A6FDB; color:#fff; }
  .dD-filterbar button:disabled { opacity:.5; cursor:default; }
  .dD-tasknav { display:flex; align-items:center; gap:7px; max-width:340px; margin-top:8px; }
  .dD-tasknav .meta { flex:1; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#9A8E7B; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .dD-bulkbar { display:flex; flex-wrap:wrap; gap:6px; max-width:340px; margin-top:8px; }
  .dD-mini { width:32px; height:28px; border-radius:7px; border:0; background:#E6DECD; color:#5C5446;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .dD-mini:disabled { opacity:.45; cursor:default; }
  .dD-task-kind { font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:700; letter-spacing:.08em;
    color:#B14228; text-transform:uppercase; margin-bottom:6px; }
  .dD-task-values { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
  .dD-task-values span, .dD-task-fact .fv span { font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5C5446; background:#F1EADB;
    border-radius:5px; padding:3px 7px; max-width:154px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dD-task-facts { display:flex; flex-direction:column; gap:5px; margin-top:9px; }
  .dD-task-fact { display:flex; align-items:center; gap:8px; }
  .dD-task-fact .fk { font-family:'IBM Plex Mono',monospace; font-size:9.5px; font-weight:700; letter-spacing:.06em;
    color:#B14228; text-transform:uppercase; min-width:34px; flex:0 0 auto; }
  .dD-task-fact .fv { display:flex; flex-wrap:wrap; gap:5px; }
  .dD-embed.task.tappable { cursor:pointer; transition:background .12s, border-color .12s; }
  .dD-embed.task.tappable:hover { background:#FBF6EC; border-left-color:#B14228; }
  .dD-tap-hint { margin-top:9px; font-size:11px; color:#B49A6A; font-weight:600; }
  .dD-embed.task.tappable:hover .dD-tap-hint { color:#B14228; }
  .dD-adv-head { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.06em;
    color:#8A6D3B; text-transform:uppercase; margin:6px 0 4px; }
  .dD-emailrow { border-top:1px dashed #E0D6C2; padding-top:10px; margin-top:10px; }
  .dD-emailrow:first-child { border-top:none; padding-top:0; margin-top:4px; }
  .dD-task-actions { flex-wrap:wrap; }
  .dD-evidence { border-left-color:#4F7A4A; }
  .dD-evidence .src-title { font-size:13.5px; font-weight:700; color:#2B2622; line-height:1.35; }
  .dD-evidence .src-meta { font-size:11.5px; color:#9A8E7B; margin-top:3px; overflow-wrap:break-word; }
  .dD-evidence .body-preview { font-size:12.5px; color:#514A3F; line-height:1.45; background:#F5EFE3;
    border-radius:6px; padding:9px 10px; margin-top:9px; max-height:138px; overflow:auto; }
  .dD-facts { display:flex; flex-direction:column; gap:5px; margin-top:9px; }
  .dD-fact { border-top:1px solid #F1EADB; padding-top:6px; font-size:12px; color:#5C5446; }

  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
</style>

<script>
(function () {
  'use strict';

  // ---- design tokens: event type palettes (see docs/UI_CONTRACT.md mapping) ----
  var TYPE_META = {
    deadline: { label: '截止', ink: '#B14228', soft: '#F6E4DC' },
    meeting:  { label: '会议', ink: '#2A6FDB', soft: '#E1ECFB' },
    personal: { label: '个人', ink: '#4F7A4A', soft: '#E4EFE2' },
    ai:       { label: 'AI 建议', ink: '#6A5BD0', soft: '#EAE6FA' }
  };

  // ---- categories: color events by category; user-customizable, stored locally ----
  var DEFAULT_CATEGORIES = [
    { key: 'deadline', label: '截止', color: '#B14228' },
    { key: 'meeting',  label: '会议', color: '#2A6FDB' },
    { key: 'personal', label: '个人', color: '#4F7A4A' },
    { key: 'bill',     label: '账单', color: '#B8860B' },
    { key: 'other',    label: '其他', color: '#6A5BD0' }
  ];
  var CAT_STORE = 'lifeagent.categories.v1';
  var CAT_ASSIGN_STORE = 'lifeagent.eventCategory.v1';
  function lsGet(key, fallback) {
    try { var raw = window.localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch (e) { return fallback; }
  }
  function lsSet(key, value) {
    try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }
  function loadCategories() {
    var stored = lsGet(CAT_STORE, null);
    var list = Array.isArray(stored) && stored.length ? stored : DEFAULT_CATEGORIES.slice();
    var map = {};
    list.forEach(function (c) { if (c && c.key) map[c.key] = { key: c.key, label: c.label || c.key, color: c.color || '#6A5BD0' }; });
    if (!map.deadline) map.deadline = { key: 'deadline', label: '截止', color: '#B14228' };
    return map;
  }
  function categoryList() { return Object.keys(state.categories).map(function (k) { return state.categories[k]; }); }
  function eventCategoryKey(item) {
    var assigned = state.eventCategory[item.eventId];
    if (assigned && state.categories[assigned]) return assigned;
    return 'deadline';
  }
  function categoryFor(item) {
    return state.categories[eventCategoryKey(item)] || state.categories.deadline || { label: '截止', color: '#B14228' };
  }
  // a translucent tint of the category color for a readable filled chip
  function catTint(color) {
    var hex = String(color || '#B14228').replace('#', '');
    if (hex.length === 3) hex = hex.replace(/(.)/g, '$1$1');
    var r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
    if (!isFinite(r)) return 'rgba(177,66,40,.16)';
    return 'rgba(' + r + ',' + g + ',' + b + ',.16)';
  }
  function setEventCategory(eventId, key) {
    state.eventCategory[eventId] = key;
    lsSet(CAT_ASSIGN_STORE, state.eventCategory);
  }
  function addCategory(label, color) {
    var key = 'cat_' + Object.keys(state.categories).length + '_' + label.replace(/\s+/g, '').slice(0, 8);
    state.categories[key] = { key: key, label: label, color: color };
    lsSet(CAT_STORE, categoryList());
    return key;
  }

  // ---- simplified task filter: 全部 / 未读 / 已阅 / 已忽略 ----
  var TASK_GROUPS = ['all', 'unread', 'read', 'ignored'];
  var TASK_GROUP_LABEL = { all: '全部', unread: '未读', read: '已阅', ignored: '已忽略' };
  var TASK_GROUP_STATUSES = {
    all: null,
    unread: ['new', 'needs_verification'],
    read: ['reviewed', 'done'],
    ignored: ['ignored']
  };
  function taskInGroup(task, group) {
    var statuses = TASK_GROUP_STATUSES[group];
    if (!statuses) return true;  // 全部: show everything, including auto-muted senders
    // Items from senders the user keeps ignoring are auto-muted — keep them out
    // of the 未读 review flow (they stay visible under 全部).
    if (group === 'unread' && task.muted) return false;
    return statuses.indexOf(String(task.status || 'new')) >= 0;
  }
  var TRUST_LABEL = {
    email_evidence: '邮件证据',
    portal_verified: '门户已验证',
    trusted_doc_context: '可信文档',
    local_evidence: '本地证据'
  };
  var TASK_KIND_LABEL = { deadline: '截止', amount: '金额', action: '动作' };
  var TASK_KIND_FILTER_LABEL = { all: '全部', deadline: '截止', amount: '金额', action: '动作' };
  var REVIEW_STATUS_LABEL = {
    new: '新',
    done: '完成',
    ignored: '忽略',
    reviewed: '已审阅',
    needs_verification: '需核对'
  };
  var TASK_STATUS_FILTER_LABEL = {
    active: '活跃',
    new: '新',
    needs_verification: '核对',
    reviewed: '已阅',
    done: '完成',
    ignored: '忽略',
    all: '全部'
  };
  var GMAIL_READINESS_LABEL = {
    ready: '已就绪',
    needs_sync: '待首次同步',
    needs_oauth: '待 OAuth',
    needs_dependency: '缺依赖'
  };
  var GMAIL_SYNC_STATUS_LABEL = {
    ready: '最近成功',
    failed: '同步失败',
    no_attempt: '未同步'
  };
  var TASK_SORT_LABEL = {
    priority: '优先级',
    due_date: '日期',
    recent: '最近'
  };
  var TASK_VIEW_LABEL = {
    all: '全部',
    needs_verification: '需核对',
    payments: '付款',
    deadlines_soon: '临近截止',
    recently_changed: '最近变化'
  };
  var TASK_VIEWS = ['all', 'needs_verification', 'payments', 'deadlines_soon', 'recently_changed'];
  var TASK_VIEW_EMPTY_COPY = {
    all: '当前没有需要处理的任务。可以刷新今日检查，或先同步新的邮件证据。',
    needs_verification: '没有低置信或需核对事项。当前证据没有被标记为需要人工复核。',
    payments: '没有付款相关事项。租金、账单、invoice、balance due 等证据会进入这里。',
    deadlines_soon: '没有可解析日期的截止事项。缺日期或相对日期的内容会留在普通任务里等待核对。',
    recently_changed: '没有最近变化的活跃任务。已完成或已忽略的历史项不会占用这个视图。'
  };
  var TASK_VIEW_CONFIG = {
    all: { kind: 'all', status: 'active', sort: 'priority' },
    needs_verification: { kind: 'all', status: 'active', sort: 'priority' },
    payments: { kind: 'all', status: 'active', sort: 'priority' },
    deadlines_soon: { kind: 'deadline', status: 'active', sort: 'due_date' },
    recently_changed: { kind: 'all', status: 'active', sort: 'recent' }
  };
  var TASK_ACTION_STATUS = {
    'task-done': 'done',
    'task-ignored': 'ignored',
    'task-reviewed': 'reviewed',
    'task-needs-verification': 'needs_verification'
  };
  var TASK_BULK_ACTION_STATUS = {
    'task-bulk-done': 'done',
    'task-bulk-reviewed': 'reviewed',
    'task-bulk-ignored': 'ignored'
  };
  var WEEKDAYS = ['一', '二', '三', '四', '五', '六', '日']; // Mon-first
  var MONTH_CN = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
  var START_H = 0, END_H = 24, HPX = 48;

  var state = {
    view: 'month',
    cursor: startOfDay(new Date()),
    events: [],          // confirmed calendar items with a parseable date_key
    undated: [],         // confirmed calendar items with no parseable date_key
    ignored: {},         // task_id -> true (calendar:<event_id> ignored via review)
    tasks: [],           // raw task review rows from /api/tasks
    allTasks: [],        // unfiltered local tasks used for saved-view session summaries
    daily: null,         // local daily landing summary
    queue: [],           // pending suggestion queue for the assistant panel
    taskQueue: [],       // non-calendar email tasks exposed as review cards
    reviewHistory: [],   // recent local task review audit rows
    taskView: 'all',
    taskFilterKind: 'all',
    taskFilterStatus: 'active',
    taskGroup: 'unread',      // simplified filter: all | unread | read | ignored
    taskSort: 'priority',
    taskCursor: 0,           // cursor into the primary deadline→calendar card
    emailCursor: 0,          // cursor into the demoted email-review pager (更多 block)
    hdrPanel: null,          // which header dropdown is open: 'bell' | 'search' | null
    advOpen: false,          // is the collapsed "更多" advanced block expanded
    alldayExpanded: false,   // week/day all-day band expanded to show every deadline
    categories: {},           // key -> {key,label,color}, customizable, localStorage-backed
    eventCategory: {},        // eventId -> category key, localStorage-backed
    busy: false
  };
  state.categories = loadCategories();
  state.eventCategory = lsGet(CAT_ASSIGN_STORE, {}) || {};

  // ---------- helpers ----------
  function startOfDay(d) { var x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
  function isoKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function parseKey(key) {
    var parts = key.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }
  function mondayIndex(d) { return (d.getDay() + 6) % 7; }
  function addDays(d, n) { var x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function escapeHtml(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function nowStamp() {
    var d = new Date();
    return '今天 ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  function clip(text, limit) {
    var s = String(text == null ? '' : text).replace(/\s+/g, ' ').trim();
    return s.length > limit ? s.slice(0, limit - 1) + '…' : s;
  }
  function eventDateText(item) {
    return (item && (item.dateText || item.dateKey)) || '日期待定';
  }
  function deadlineLineHtml(item) {
    return '<div class="ddl-line"><span class="ddl-label">候选截止日</span><span class="ddl-date">' +
      escapeHtml(eventDateText(item)) + '</span></div>';
  }
  function receivedMetaText(source) {
    var parts = [];
    if (source.sender) parts.push(source.sender);
    if (source.received_at) parts.push('收到 ' + source.received_at);
    if (source.message_id) parts.push(source.message_id);
    return parts.join(' · ');
  }

  // ---------- data ----------
  function taskApiUrl() {
    return '/api/tasks?view=' + encodeURIComponent(state.taskView || 'all') +
      '&sort=' + encodeURIComponent(state.taskSort || 'priority') +
      '&limit=1000';  // one email can yield 2-3 fact tasks; don't truncate the queue at the default 100
  }

  function mapItem(raw) {
    var pending = raw.approval_state === 'draft';
    return {
      eventId: raw.event_id,
      title: raw.title || '(未命名)',
      dateKey: raw.date_key || '',
      dateText: raw.date_text || '',
      pending: pending,
      uncertain: !!raw.uncertain,
      confidence: raw.confidence,
      type: pending ? 'ai' : 'deadline',
      source: TRUST_LABEL[raw.source_trust] || raw.source_trust || '本地证据',
      sourceIds: raw.source_ids || [],
      sourceTrust: raw.source_trust || '',
      sourceCount: raw.source_count || 0,
      evidenceUri: raw.evidence_uri || '',
      syncState: raw.sync_state,
      startTime: raw.start_time || '',
      endTime: raw.end_time || '',
      userCreated: raw.sync_state === 'user_created' ||
        (raw.source_ids || []).indexOf('user:created') >= 0
    };
  }

  function visibleCalendarItems(items) {
    return items.filter(function (item) { return !item.pending; });
  }

  function pendingCalendarItems(items) {
    return items.filter(function (item) { return item.pending; });
  }

  function loadData() {
    return Promise.all([
      fetch('/api/calendar/events').then(function (r) { return r.json(); }),
      fetch(taskApiUrl()).then(function (r) { return r.json(); }),
      fetch('/api/daily/summary').then(function (r) { return r.json(); }),
      fetch('/api/tasks?view=all&sort=priority&limit=1000').then(function (r) { return r.json(); })
    ]).then(function (results) {
      var events = results[0], tasks = results[1] || [], allTasks = results[3] || tasks;
      state.daily = results[2];
      state.tasks = tasks;
      state.allTasks = allTasks;
      state.ignored = {};
      allTasks.forEach(function (t) {
        if (t.status === 'ignored') state.ignored[t.task_id] = true;
      });
      var mapped = (events || []).map(mapItem).filter(function (item) {
        return !(item.pending && state.ignored['calendar:' + item.eventId]);
      });
      var visible = visibleCalendarItems(mapped);
      state.events = visible.filter(function (item) { return item.dateKey; });
      state.undated = visible.filter(function (item) { return !item.dateKey; });
      state.queue = pendingCalendarItems(mapped);
      state.taskQueue = tasks;
      clampTaskCursor();
    });
  }

  function isReviewTask(task) {
    var taskId = String(task.task_id || '');
    return !taskId.startsWith('calendar:');
  }

  function isActiveTaskStatus(status) {
    return ['new', 'needs_verification', 'reviewed'].indexOf(String(status || 'new')) >= 0;
  }

  function confidenceValue(task) {
    var value = Number(task && task.confidence);
    return Number.isFinite(value) ? value : 0;
  }

  function taskHasReason(task, reason) {
    return Array.isArray(task.priority_reasons) && task.priority_reasons.indexOf(reason) >= 0;
  }

  function taskHasPaymentContext(task) {
    var parts = [task.title, task.value, task.evidence, task.subject].concat(task.values || []);
    return /(rent|payment|pay |pay$|balance|invoice|bill|tuition|fee|premium|amount due|\$)/i.test(parts.join(' '));
  }

  function taskHasTimestamp(task) {
    return !!(task.updated_at || task.received_at || task.reviewed_at || task.created_at);
  }

  function taskMatchesSavedView(task, view) {
    var status = String(task.status || 'new');
    if (view === 'all') return true;
    if (view === 'needs_verification') {
      return status === 'needs_verification' || !!task.needs_verification ||
        confidenceValue(task) < 0.7 || taskHasReason(task, 'low_trust_or_missing_source');
    }
    if (view === 'payments') {
      return task.kind === 'amount' || taskHasReason(task, 'payment_context') || taskHasPaymentContext(task);
    }
    if (view === 'deadlines_soon') return task.kind === 'deadline' && !!(task.due_date || task.value);
    if (view === 'recently_changed') return taskHasTimestamp(task) && isActiveTaskStatus(status);
    return false;
  }

  function shouldShowTaskInReview(task) {
    if (state.taskView === 'deadlines_soon') return String(task.kind || '') === 'deadline';
    return isReviewTask(task);
  }

  function shouldShowTaskInViewReview(task, view) {
    if (view === 'deadlines_soon') return String(task.kind || '') === 'deadline';
    return isReviewTask(task);
  }

  function viewTasks(view) {
    return (state.allTasks || []).filter(function (task) {
      return taskMatchesSavedView(task, view) && shouldShowTaskInViewReview(task, view);
    });
  }

  function taskViewStats(view) {
    var tasks = viewTasks(view);
    var counts = { total: tasks.length, active: 0, new: 0, needs_verification: 0, reviewed: 0, done: 0, ignored: 0 };
    tasks.forEach(function (task) {
      var status = String(task.status || 'new');
      if (counts[status] == null) counts[status] = 0;
      counts[status] += 1;
      if (isActiveTaskStatus(status)) counts.active += 1;
    });
    counts.classified = Math.max(0, counts.total - counts.new);
    return counts;
  }

  function taskSessionStats() {
    var scope = state.taskQueue.filter(function (task) {
      var reviewOk = shouldShowTaskInReview(task);
      var kindOk = state.taskFilterKind === 'all' || task.kind === state.taskFilterKind;
      return reviewOk && kindOk;
    });
    var queue = filteredTaskQueue();
    var counts = { total: scope.length, queue: queue.length, new: 0, needs_verification: 0, reviewed: 0, done: 0, ignored: 0 };
    scope.forEach(function (task) {
      var status = String(task.status || 'new');
      if (counts[status] == null) counts[status] = 0;
      counts[status] += 1;
    });
    counts.classified = Math.max(0, counts.total - counts.new);
    return counts;
  }

  function filteredTaskQueue() {
    return state.taskQueue.filter(function (task) {
      return shouldShowTaskInReview(task) && taskInGroup(task, state.taskGroup);
    });
  }

  // ---- email aggregation: present ONE card per source email, not one per fact ----
  // The backend yields a task per (kind, email) — a single notice can become a
  // 截止 + 金额 + 动作 trio. Counting cards made "处理一封邮件" feel like nothing
  // moved (the same email's sibling cards stayed). Here the dashboard collapses a
  // source email's facts into one card whose actions resolve all of them at once,
  // so the count tracks emails and drops by one per email handled.
  var TASK_KIND_ORDER = { deadline: 0, amount: 1, action: 2 };

  function emailGroupKey(task) {
    return String(task.primary_source || task.task_id || '');
  }

  function rollupGroupStatus(children) {
    var statuses = children.map(function (c) { return String(c.status || 'new'); });
    // any unresolved fact keeps the whole email in the unread review flow
    if (statuses.some(function (s) { return s === 'new' || s === 'needs_verification'; })) {
      return statuses.some(function (s) { return s === 'new'; }) ? 'new' : 'needs_verification';
    }
    if (statuses.some(function (s) { return s === 'done'; })) return 'done';
    if (statuses.some(function (s) { return s === 'reviewed'; })) return 'reviewed';
    return 'ignored';  // every fact was ignored
  }

  function aggregateEmailGroup(children) {
    var primary = children.reduce(function (best, c) {
      return Number(c.priority_score || 0) > Number(best.priority_score || 0) ? c : best;
    }, children[0]);
    var kinds = [];
    var reasons = [];
    children.forEach(function (c) {
      if (kinds.indexOf(c.kind) < 0) kinds.push(c.kind);
      (c.priority_reasons || []).forEach(function (r) { if (reasons.indexOf(r) < 0) reasons.push(r); });
    });
    kinds.sort(function (a, b) {
      return (TASK_KIND_ORDER[a] == null ? 9 : TASK_KIND_ORDER[a]) -
             (TASK_KIND_ORDER[b] == null ? 9 : TASK_KIND_ORDER[b]);
    });
    var facts = children.slice().sort(function (a, b) {
      return (TASK_KIND_ORDER[a.kind] == null ? 9 : TASK_KIND_ORDER[a.kind]) -
             (TASK_KIND_ORDER[b.kind] == null ? 9 : TASK_KIND_ORDER[b.kind]);
    }).map(function (c) {
      var vals = Array.isArray(c.values) && c.values.length ? c.values : (c.value ? [c.value] : []);
      return { kind: c.kind, values: vals };
    });
    var allValues = [];
    facts.forEach(function (f) {
      f.values.forEach(function (v) { if (v && allValues.indexOf(v) < 0) allValues.push(v); });
    });
    return {
      task_id: primary.task_id,
      task_ids: children.map(function (c) { return c.task_id; }),
      child_count: children.length,
      kind: primary.kind,
      kinds: kinds,
      facts: facts,
      title: primary.title,
      subject: primary.subject,
      sender: primary.sender,
      value: primary.value,
      values: allValues,
      fact_count: children.reduce(function (n, c) { return n + (Number(c.fact_count) || 0); }, 0),
      confidence: children.reduce(function (m, c) { return Math.max(m, Number(c.confidence || 0)); }, 0),
      status: rollupGroupStatus(children),
      muted: children.some(function (c) { return !!c.muted; }),
      needs_verification: children.some(function (c) { return !!c.needs_verification; }),
      priority_score: primary.priority_score,
      priority_band: primary.priority_band,
      priority_reasons: reasons,
      source_type: primary.source_type,
      primary_source: primary.primary_source,
      source_trust: primary.source_trust,
      evidence: primary.evidence
    };
  }

  function emailGroups() {
    var byKey = {};
    var order = [];
    state.taskQueue.forEach(function (task) {
      if (!shouldShowTaskInReview(task)) return;
      var key = emailGroupKey(task);
      if (!byKey[key]) { byKey[key] = []; order.push(key); }
      byKey[key].push(task);
    });
    // state.taskQueue arrives priority-sorted, so first-seen key order == priority order
    return order.map(function (key) { return aggregateEmailGroup(byKey[key]); });
  }

  function groupsInBucket(group) {
    return emailGroups().filter(function (g) { return taskInGroup(g, group); });
  }

  function groupCount(group) {
    // Chips now filter only the demoted email-review queue; pending deadline
    // drafts are the separate primary surface and aren't counted here.
    return groupsInBucket(group).length;
  }

  // The demoted email-fact review queue (amounts/actions), rendered inside the
  // 更多 block. Capped — this is a secondary surface; bulk/CLI/ops handle the tail.
  // Demoted email-review queue, shown one card at a time with ‹ › paging — same
  // single-card pattern as the primary deadline card, so a long queue doesn't
  // stack into a wall of cards.
  function emailReviewCardHtml() {
    var groups = groupsInBucket(state.taskGroup);
    if (state.emailCursor >= groups.length) state.emailCursor = groups.length ? groups.length - 1 : 0;
    if (state.emailCursor < 0) state.emailCursor = groups.length ? groups.length - 1 : 0;
    var total = groups.length;
    var nav = '<div class="dD-cardnav" id="emailNavState">' +
      '<button class="dD-mini" data-act="email-prev"' + (total ? '' : ' disabled') + '>‹</button>' +
      '<span class="meta">' + (total ? state.emailCursor + 1 : 0) + '/' + total + ' · ' +
        escapeHtml(TASK_GROUP_LABEL[state.taskGroup] || '全部') + '</span>' +
      '<button class="dD-mini" data-act="email-next"' + (total ? '' : ' disabled') + '>›</button></div>';
    if (!total) {
      return nav + '<div class="dD-empty compact">' +
        escapeHtml((TASK_GROUP_LABEL[state.taskGroup] || '当前') + '里没有邮件复核项。') + '</div>';
    }
    return nav + taskReviewCard(groups[state.emailCursor], '');
  }

  function renderEmailCard() {
    var slot = document.getElementById('emailReviewSlot');
    if (slot) slot.innerHTML = emailReviewCardHtml();
  }

  function moveEmailCursor(offset) {
    var total = groupsInBucket(state.taskGroup).length;
    if (!total) { state.emailCursor = 0; renderEmailCard(); return; }
    state.emailCursor = (state.emailCursor + offset + total) % total;
    renderEmailCard();
  }

  function clampTaskCursor(items) {
    var queue = items || reviewItems();  // cursor indexes the grouped review queue (emails + calendar drafts)
    if (!queue.length) {
      state.taskCursor = 0;
      return;
    }
    if (state.taskCursor < 0) state.taskCursor = queue.length - 1;
    if (state.taskCursor >= queue.length) state.taskCursor = queue.length - 1;
  }

  function taskFilterCount(kind, statusFilter) {
    return state.taskQueue.filter(function (task) {
      var reviewOk = shouldShowTaskInReview(task);
      var kindOk = kind === 'all' || task.kind === kind;
      var status = String(task.status || 'new');
      var statusOk = statusFilter === 'all' ||
        (statusFilter === 'active' ? isActiveTaskStatus(status) : status === statusFilter);
      return reviewOk && kindOk && statusOk;
    }).length;
  }

  function taskFilterControls() {
    var groupButtons = TASK_GROUPS.map(function (group) {
      var selected = state.taskGroup === group ? ' on' : '';
      return '<button class="' + selected.trim() + '" data-act="task-group" data-group="' +
        group + '">' + escapeHtml(TASK_GROUP_LABEL[group]) + ' ' + groupCount(group) + '</button>';
    }).join('');
    return '<div id="taskQueueFilters">' +
      '<div class="dD-filterbar" data-task-filter="group">' + groupButtons + '</div></div>';
  }

  function taskNextViewButtons() {
    return TASK_VIEWS.filter(function (view) {
      return view !== state.taskView && taskViewStats(view).active > 0;
    }).slice(0, 3).map(function (view) {
      var stats = taskViewStats(view);
      return '<button data-act="task-view" data-view="' + escapeHtml(view) + '">' +
        escapeHtml(TASK_VIEW_LABEL[view]) + ' ' + stats.active + '</button>';
    }).join('');
  }

  function taskSessionEmptyCopy(stats, viewStats) {
    if (viewStats.total && stats.total && !stats.queue) {
      return '当前状态筛选下没有任务。切回“活跃”或“全部”可以查看这个视图里的其他本地任务。';
    }
    if (viewStats.total && !stats.total) {
      return '当前类型筛选下没有任务。切回“全部”类型可以查看这个视图里的其他本地任务。';
    }
    return TASK_VIEW_EMPTY_COPY[state.taskView] || '当前视图没有任务。';
  }

  function taskSessionPanel() {
    var stats = taskSessionStats();
    var viewStats = taskViewStats(state.taskView);
    var label = TASK_VIEW_LABEL[state.taskView] || state.taskView;
    var statusLabel = TASK_GROUP_LABEL[state.taskGroup] || state.taskGroup;
    var nextViews = taskNextViewButtons();
    var emptyNote = !stats.queue
      ? '<div class="dD-empty compact">' + escapeHtml(taskSessionEmptyCopy(stats, viewStats)) + '</div>'
      : '';
    var nextHtml = !stats.queue && nextViews
      ? '<div class="dD-session-next">' + nextViews + '</div>'
      : '';
    return '<div class="dD-embed session" id="taskSessionSummary"><h4>' + escapeHtml(label) + '审查 · 进度</h4>' +
      '<div class="dD-sumrow"><div class="n">' + viewStats.total + '</div><div><div class="lab">本视图任务</div><div class="sub">活跃 ' +
        viewStats.active + ' · 完成 ' + viewStats.done + ' · 忽略 ' + viewStats.ignored + '</div></div></div>' +
      '<div class="dD-sumrow"><div class="n' + (stats.queue ? ' u' : '') + '">' + stats.queue + '</div><div><div class="lab">当前队列</div><div class="sub">' +
        escapeHtml(statusLabel) + ' · 新 ' + stats.new + ' · 核对 ' + stats.needs_verification + ' · 已阅 ' + stats.reviewed + '</div></div></div>' +
      '<div class="dD-sumrow"><div class="n">' + stats.classified + '</div><div><div class="lab">本轮已归类</div><div class="sub">完成 ' +
        stats.done + ' · 忽略 ' + stats.ignored + ' · 需核对 ' + stats.needs_verification + '</div></div></div>' +
      '<div class="dD-session-note">当前统计来自本地 SQLite 任务和 review audit，不会刷新 Gmail、发送邮件或写外部日历。</div>' +
      emptyNote + nextHtml + '</div>';
  }

  function receiptStatusText(counts) {
    counts = counts || {};
    var parts = ['done', 'needs_verification', 'reviewed', 'ignored'].map(function (status) {
      var count = Number(counts[status] || 0);
      return count ? (REVIEW_STATUS_LABEL[status] + ' ' + count) : '';
    }).filter(Boolean);
    return parts.length ? parts.join(' · ') : '暂无本地审查变更';
  }

  function reviewReceiptPanel() {
    var receipt = (state.daily && state.daily.review_receipt) || {};
    var eventCount = Number(receipt.review_event_count || 0);
    var netCount = Number(receipt.net_changed_task_count || 0);
    var latest = receipt.latest_reviewed_at || '暂无';
    var recent = Array.isArray(receipt.recent) ? receipt.recent : [];
    var recentNote = recent.length
      ? '<div class="dD-session-note">最近：' + escapeHtml(clip(recent[0].summary || '', 96)) + '</div>'
      : '<div class="dD-empty compact">还没有本地任务审查动作。完成、已阅、需核对或忽略后会出现在这里。</div>';
    return '<div class="dD-embed receipt" id="taskReviewReceipt"><h4>审查回执 · 本地变更</h4>' +
      '<div class="dD-sumrow"><div class="n' + (netCount ? ' u' : '') + '">' + netCount + '</div><div><div class="lab">当前有效变更</div><div class="sub">' +
        escapeHtml(receiptStatusText(receipt.counts_by_status)) + '</div></div></div>' +
      '<div class="dD-sumrow"><div class="n">' + eventCount + '</div><div><div class="lab">审查记录</div><div class="sub">可撤销 ' +
        escapeHtml(receipt.undoable_count || 0) + ' · 已撤销 ' + escapeHtml(receipt.undone_count || 0) + '</div></div></div>' +
      '<div class="dD-sumrow"><div class="n">↺</div><div><div class="lab">最新变更</div><div class="sub">' +
        escapeHtml(latest) + '</div></div></div>' +
      '<div class="dD-session-note">回执只聚合本地 review audit，不刷新 Gmail、发送邮件或写外部日历。</div>' +
      recentNote + '</div>';
  }

  function gmailReadinessPanel() {
    var readiness = (state.daily && state.daily.gmail_readiness) || {};
    var status = readiness.status || 'unknown';
    var statusLabel = GMAIL_READINESS_LABEL[status] || '未检查';
    var action = readiness.next_action || {};
    var checks = Array.isArray(readiness.checks) ? readiness.checks : [];
    var blockers = checks.filter(function (check) {
      return check && check.status && check.status !== 'ready';
    }).map(function (check) {
      return check.detail || check.name || check.status;
    }).slice(0, 2);
    var evidenceCount = Number(readiness.stored_message_count || 0);
    var localText = '本地邮件 ' + evidenceCount + ' · 游标 ' + (readiness.has_cursor ? '有' : '无');
    var oauthText = readiness.oauth_ready ? 'OAuth 已就绪' : 'OAuth 待配置';
    var issueText = blockers.length ? blockers.join(' · ') : 'Gmail 只读路径可以进入下一步';
    var next = action.command
      ? '<div class="dD-command">' + escapeHtml(action.command) + '</div>'
      : '';
    return '<div class="dD-embed gmail" id="gmailReadiness"><h4>Gmail 首次运行 · 就绪检查</h4>' +
      '<div class="dD-sumrow"><div class="n' + (status === 'ready' ? '' : ' u') + '">' + escapeHtml(statusLabel) + '</div><div><div class="lab">当前状态</div><div class="sub">' +
        escapeHtml(oauthText) + ' · 只读本地检查</div></div></div>' +
      '<div class="dD-sumrow"><div class="n">' + evidenceCount + '</div><div><div class="lab">证据与游标</div><div class="sub">' +
        escapeHtml(localText) + '</div></div></div>' +
      '<div class="dD-session-note">' + escapeHtml(issueText) + '</div>' +
      next + '</div>';
  }

  function gmailSyncDiagnosticsPanel() {
    var diagnostics = (state.daily && state.daily.gmail_sync_diagnostics) || {};
    var status = diagnostics.status || 'no_attempt';
    if (status === 'no_attempt') return '';
    var label = GMAIL_SYNC_STATUS_LABEL[status] || '未检查';
    var failure = diagnostics.latest_failure || {};
    var success = diagnostics.latest_success || {};
    var action = diagnostics.next_action || {};
    var headline = status === 'failed'
      ? (failure.category || 'unknown')
      : ('消息 ' + (success.message_count || 0) + ' · 游标 ' + (success.cursor_saved ? '已保存' : '未保存'));
    var detail = status === 'failed'
      ? (failure.detail || '最近 Gmail 同步失败。')
      : ('最近成功：' + (success.created_at || '暂无时间'));
    var next = action.command
      ? '<div class="dD-command">' + escapeHtml(action.command) + '</div>'
      : '';
    return '<div class="dD-embed gmail" id="gmailSyncDiagnostics"><h4>Gmail 同步诊断 · 本地记录</h4>' +
      '<div class="dD-sumrow"><div class="n' + (status === 'failed' ? ' u' : '') + '">' + escapeHtml(label) + '</div><div><div class="lab">' +
        escapeHtml(headline) + '</div><div class="sub">失败 ' + (diagnostics.recent_failure_count || 0) + ' · 成功 ' +
        (diagnostics.recent_success_count || 0) + '</div></div></div>' +
      '<div class="dD-session-note">' + escapeHtml(detail) + '</div>' +
      next + '</div>';
  }

  function taskCardMeta(queue) {
    var stats = taskSessionStats();
    return (state.taskCursor + 1) + '/' + queue.length + ' · 已归类 ' + stats.classified + '/' + stats.total;
  }

  function taskEmptyStateMessage() {
    return '<div class="dD-body">没有待加入日历的截止了。金额/动作的邮件复核在下方「更多」里。</div>';
  }

  function advancePastTask(taskId) {
    // after an action the acted item leaves the queue, so the same cursor index
    // now points at the next item — just clamp against the unified queue length
    var n = reviewItems().length;
    if (state.taskCursor >= n) state.taskCursor = n ? n - 1 : 0;
    if (state.taskCursor < 0) state.taskCursor = 0;
  }

  function byDate() {
    var map = {};
    state.events.forEach(function (item) {
      (map[item.dateKey] = map[item.dateKey] || []).push(item);
    });
    return map;
  }

  // ---------- calendar rendering ----------
  function chipStyle(item) {
    var c = categoryFor(item);
    return 'background:' + catTint(c.color) + ';color:' + c.color + ';border:1px solid ' + c.color + ';';
  }
  function parseHM(value) {
    var m = /^(\d{1,2}):(\d{2})$/.exec(String(value || '').trim());
    return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : null;
  }
  function chipHtml(item, cls) {
    var timePrefix = item.startTime ? item.startTime + ' ' : '';
    return '<div class="' + cls + (item.pending ? ' pending' : '') + '" data-event-id="' + escapeHtml(item.eventId) +
      '" style="' + chipStyle(item) + '" title="' +
      escapeHtml(item.title + ' · ' + item.source + (item.pending ? ' · 草稿' : ' · 已确认')) + '">' +
      escapeHtml(timePrefix + item.title) + (item.uncertain ? ' ?' : '') + '</div>';
  }

  function renderTitle() {
    var c = state.cursor, el = document.getElementById('calTitle');
    if (state.view === 'month') {
      el.innerHTML = MONTH_CN[c.getMonth()] + ' <em>' + c.getFullYear() + '</em>';
    } else if (state.view === 'week') {
      var monday = addDays(c, -mondayIndex(c)), sunday = addDays(monday, 6);
      var label = (monday.getMonth() + 1) + '月' + monday.getDate() + ' – ' +
        (sunday.getMonth() === monday.getMonth() ? '' : (sunday.getMonth() + 1) + '月') + sunday.getDate();
      el.innerHTML = escapeHtml(label) + ' <em>周</em>';
    } else if (state.view === 'day') {
      el.innerHTML = (c.getMonth() + 1) + '月' + c.getDate() + '日 <em>周' + WEEKDAYS[mondayIndex(c)] + '</em>';
    } else {
      el.innerHTML = '议程 <em>接下来</em>';
    }
  }

  function renderMonth(body) {
    var c = state.cursor, map = byDate();
    var first = new Date(c.getFullYear(), c.getMonth(), 1);
    var lead = mondayIndex(first);
    var daysInMonth = new Date(c.getFullYear(), c.getMonth() + 1, 0).getDate();
    var total = Math.ceil((lead + daysInMonth) / 7) * 7;
    var todayKey = isoKey(new Date());
    var html = '<div class="dD-week">' + WEEKDAYS.map(function (w) { return '<span>周' + w + '</span>'; }).join('') + '</div>';
    html += '<div class="dD-grid" style="grid-template-rows:repeat(' + (total / 7) + ',1fr);">';
    for (var i = 0; i < total; i++) {
      var date = addDays(first, i - lead);
      var out = date.getMonth() !== c.getMonth();
      var key = isoKey(date);
      var items = out ? [] : (map[key] || []);
      var isToday = key === todayKey && !out;
      var hasEvents = items.length > 0;
      html += '<div class="dD-cell' + (out ? ' out' : '') + (isToday ? ' today' : '') +
        (hasEvents ? ' has-events' : '') + '"' + (hasEvents ? ' data-day-key="' + key + '"' : '') +
        (out ? '' : ' data-new-day="' + key + '"') + '>';
      html += '<div class="dD-dn">' + (date.getDate() === 1 ? (date.getMonth() + 1) + '/1' : date.getDate()) + '</div>';
      html += '<div class="dD-cellchips">';
      items.slice(0, 3).forEach(function (item) { html += chipHtml(item, 'dD-blk'); });
      html += '</div>';
      if (items.length > 3) html += '<div class="dD-more" data-day-key="' + key + '">+' + (items.length - 3) + ' 更多</div>';
      html += '</div>';
    }
    html += '</div>';
    body.innerHTML = html;
  }

  function renderTimeGrid(body, days) {
    // preserve the user's scroll across the 1-minute now-line refresh; default to 07:00
    var prevBody = body.querySelector('.dD-tg-body');
    var prevScroll = prevBody ? prevBody.scrollTop : -1;
    var map = byDate(), todayKey = isoKey(new Date());
    var cols = '56px repeat(' + days.length + ',1fr)';
    var PAD = 12;  // top/bottom inset so the 00:00 and 24:00 labels aren't half-clipped
    var gridH = (END_H - START_H) * HPX + PAD * 2;
    var html = '<div class="dD-tg">';
    html += '<div class="dD-tg-head" style="grid-template-columns:' + cols + '"><div></div>';
    days.forEach(function (d) {
      var key = isoKey(d);
      html += '<div class="wk-dh' + (key === todayKey ? ' is-today' : '') + '">' +
        '<div class="wd">周' + WEEKDAYS[mondayIndex(d)] + '</div>' +
        '<div class="dnum">' + d.getDate() + '</div></div>';
    });
    html += '</div>';
    // all-day band (Google/Apple style): date-only deadlines as chips in a sticky top
    // band. Collapsed shows ~2 rows with per-day "+N"; the 全天 ▾ toggle expands it
    // (taller + internally scrollable) so it never grows unbounded or clips.
    var allDayOf = function (d) { return (map[isoKey(d)] || []).filter(function (i) { return !i.startTime; }); };
    var anyOverflow = days.some(function (d) { return allDayOf(d).length > 2; });
    var expanded = state.alldayExpanded;
    var toggle = anyOverflow
      ? '<button class="adg-toggle" data-act="toggle-allday">全天 ' + (expanded ? '▴' : '▾') + '</button>'
      : '<span>全天</span>';
    html += '<div class="dD-allday' + (expanded ? ' expanded' : '') + '" style="grid-template-columns:' + cols + '">' +
      '<div class="adg-lab">' + toggle + '</div>';
    days.forEach(function (d) {
      var dayKey = isoKey(d);
      var dayItems = allDayOf(d);  // timed events render in the grid below, not the all-day band
      html += '<div class="adg-cell">';
      if (expanded || dayItems.length <= 2) {
        dayItems.forEach(function (item) { html += chipHtml(item, 'ad-chip'); });
      } else {
        html += chipHtml(dayItems[0], 'ad-chip');
        html += '<div class="dD-more" data-day-key="' + dayKey + '">+' + (dayItems.length - 1) + ' 更多</div>';
      }
      html += '</div>';
    });
    html += '</div>';
    // explicit grid-template-rows keeps the columns (and their vertical borders) full-height
    // even when the scrollable body is flex-shrunk shorter than the grid
    html += '<div class="dD-tg-body" style="grid-template-columns:' + cols + ';grid-template-rows:' + gridH + 'px;height:' + gridH + 'px;">';
    html += '<div class="tg-gutter">';
    for (var h = START_H; h <= END_H; h++) {
      var top = (h - START_H) * HPX + PAD;
      html += '<div class="tg-hr" style="top:' + top + 'px">' + String(h).padStart(2, '0') + ':00</div>';
      html += '<div class="gln" style="top:' + top + 'px"></div>';
    }
    html += '</div>';
    var now = new Date();
    var nowOffset = (now.getHours() + now.getMinutes() / 60 - START_H) * HPX + PAD;
    days.forEach(function (d) {
      var dayKey = isoKey(d);
      html += '<div class="tg-col" data-new-day="' + dayKey + '">';
      for (var h = START_H; h <= END_H; h++) {
        html += '<div class="ln" style="top:' + ((h - START_H) * HPX + PAD) + 'px"></div>';
      }
      // timed events as positioned blocks (all-day/date-only ones stay in the band above)
      (map[dayKey] || []).forEach(function (item) {
        if (!item.startTime) return;
        var sm = parseHM(item.startTime);
        if (sm == null) return;
        var em = item.endTime ? parseHM(item.endTime) : null;
        if (em == null || em <= sm) em = sm + 60;
        var top = (sm / 60 - START_H) * HPX + PAD;
        var blockH = Math.max(20, ((em - sm) / 60) * HPX - 2);
        var timeLabel = item.startTime + (item.endTime ? '–' + item.endTime : '');
        html += '<div class="tg-ev" data-event-id="' + escapeHtml(item.eventId) + '" style="top:' + top +
          'px;height:' + blockH + 'px;' + chipStyle(item) + '" title="' + escapeHtml(timeLabel + ' ' + item.title) + '">' +
          escapeHtml(item.title) + ' <span style="font-weight:400;opacity:.8">' + escapeHtml(timeLabel) + '</span></div>';
      });
      if (dayKey === todayKey && nowOffset >= PAD && nowOffset <= (END_H - START_H) * HPX + PAD) {
        html += '<div class="tg-now" style="top:' + nowOffset + 'px"></div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
    body.innerHTML = html;
    var newBody = body.querySelector('.dD-tg-body');
    if (newBody) newBody.scrollTop = prevScroll >= 0 ? prevScroll : Math.max(0, (7 - START_H) * HPX);
  }

  function renderAgenda(body) {
    var today = startOfDay(new Date()), todayKey = isoKey(today);
    var upcoming = state.events.filter(function (item) { return item.dateKey >= todayKey; });
    var groups = {};
    upcoming.forEach(function (item) { (groups[item.dateKey] = groups[item.dateKey] || []).push(item); });
    var keys = Object.keys(groups).sort();
    var html = '<div class="dD-ag">';
    if (!keys.length && !state.undated.length) {
      html += '<div class="dD-empty">接下来没有已确认日程。候选截止在右侧复核，点击加入日历后才会显示在这里。</div>';
    }
    keys.forEach(function (key) {
      var d = parseKey(key);
      var diff = Math.round((startOfDay(d) - today) / 86400000);
      var rel = diff === 0 ? '今天' : diff === 1 ? '明天' : diff + ' 天后';
      html += '<div class="ag-day"><div class="ag-dl' + (diff === 0 ? ' today' : '') + '">' +
        '<div class="dow">周' + WEEKDAYS[mondayIndex(d)] + '</div>' +
        '<div class="dd">' + (d.getMonth() + 1) + '/' + d.getDate() + '</div>' +
        '<div class="rel">' + rel + '</div></div><div class="ag-rows">';
      groups[key].forEach(function (item) { html += agendaRow(item, '全天'); });
      html += '</div></div>';
    });
    if (state.undated.length) {
      html += '<div class="ag-day"><div class="ag-dl">' +
        '<div class="dow">待定</div><div class="dd">—</div><div class="rel">日期待定</div></div><div class="ag-rows">';
      state.undated.forEach(function (item) { html += agendaRow(item, item.dateText || '—'); });
      html += '</div></div>';
    }
    html += '</div>';
    body.innerHTML = html;
  }

  function agendaRow(item, timeLabel) {
    var c = categoryFor(item);
    return '<div class="ag-row' + (item.pending ? ' pending' : '') + '" data-event-id="' + escapeHtml(item.eventId) +
      '" style="border-left-color:' + c.color + '">' +
      '<div class="ag-time">' + escapeHtml(timeLabel) + '</div>' +
      '<span class="ag-dot" style="background:' + c.color + '"></span>' +
      '<div class="ag-ttl">' + escapeHtml(item.title) + (item.uncertain ? ' ?' : '') + '</div>' +
      '<span class="ag-chip" style="background:' + catTint(c.color) + ';color:' + c.color + '">' + escapeHtml(c.label) + '</span>' +
      '<div class="ag-src">' + escapeHtml(item.source) + '</div></div>';
  }

  function renderCalendar() {
    renderTitle();
    document.querySelectorAll('#calSeg button').forEach(function (btn) {
      btn.classList.toggle('on', btn.dataset.view === state.view);
    });
    var body = document.getElementById('calBody');
    if (state.view === 'month') renderMonth(body);
    else if (state.view === 'week') {
      var monday = addDays(state.cursor, -mondayIndex(state.cursor));
      renderTimeGrid(body, [0, 1, 2, 3, 4, 5, 6].map(function (i) { return addDays(monday, i); }));
    }
    else if (state.view === 'day') renderTimeGrid(body, [state.cursor]);
    else renderAgenda(body);
  }

  // ---------- event detail / edit popup ----------
  function getEventById(id) {
    return state.events.concat(state.undated).filter(function (it) { return it.eventId === id; })[0];
  }
  function catChipsHtml(item) {
    var current = eventCategoryKey(item);
    return categoryList().map(function (c) {
      return '<span class="ev-cat' + (c.key === current ? ' on' : '') + '" data-cat="' + c.key +
        '" style="background:' + catTint(c.color) + ';color:' + c.color + '">' + escapeHtml(c.label) + '</span>';
    }).join('');
  }
  function catAddHtml(adding) {
    return adding
      ? '<input type="text" id="newCatName" placeholder="类别名" style="width:84px">' +
        '<input type="color" id="newCatColor" value="#C77B30" style="width:32px;height:26px;padding:0;border:1px solid #E4DBC9;border-radius:6px;vertical-align:middle">' +
        '<span class="ev-cat-add" data-act="ev-add-cat-confirm">添加</span>'
      : '<span class="ev-cat-add" data-act="ev-add-cat">＋ 新类别</span>';
  }
  function renderCatRow(item, adding) {
    var cats = document.getElementById('evCats');
    if (cats) cats.innerHTML = catChipsHtml(item) + catAddHtml(adding);
  }
  function closeEventPopup() {
    var back = document.getElementById('evPopBack');
    if (back) back.remove();
  }
  function saveEventEdits(item) {
    if (state.busy) return;
    var titleEl = document.getElementById('evTitle');
    var dateEl = document.getElementById('evDate');
    var startEl = document.getElementById('evStart');
    var endEl = document.getElementById('evEnd');
    var title = titleEl ? titleEl.value : item.title;
    var date = dateEl ? dateEl.value : (item.dateText || item.dateKey || '');
    var start = startEl ? startEl.value : (item.startTime || '');
    var end = endEl ? endEl.value : (item.endTime || '');
    state.busy = true;
    fetch('/api/calendar/drafts/update?event_id=' + encodeURIComponent(item.eventId) +
      '&title=' + encodeURIComponent(title || '') + '&date=' + encodeURIComponent(date || '') +
      '&start=' + encodeURIComponent(start || '') + '&end=' + encodeURIComponent(end || '') +
      (item.userCreated ? '&user=1' : ''), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.error) { botMessage('<div class="dD-body uncertain">保存失败：' + escapeHtml(res.error) + '</div>'); return; }
        closeEventPopup();
        botMessage('<div class="dD-body">已保存对「' + escapeHtml(title) + '」的修改（只写本地草稿，不写外部日历）。</div>');
        return refresh();
      })
      .catch(function (err) { botMessage('<div class="dD-body uncertain">保存失败：' + escapeHtml(err) + '</div>'); })
      .finally(function () { state.busy = false; });
  }

  // ---------- create / delete user events (Google/Apple-style) ----------
  function openCreateEventPopup(prefill) {
    closeEventPopup();
    prefill = prefill || {};
    var back = document.createElement('div');
    back.className = 'ev-pop-back';
    back.id = 'evPopBack';
    back.innerHTML =
      '<div class="ev-pop" id="evPop">' +
      '<span class="ev-x" data-act="ev-close">×</span>' +
      '<span class="ev-status" style="background:#E4EFE2;color:#4F7A4A">新建</span>' +
      '<h3>新建日程</h3>' +
      '<div class="ev-row"><span class="lab">标题</span><input type="text" id="ceTitle" placeholder="事件标题"></div>' +
      '<div class="ev-row"><span class="lab">日期</span><input type="date" id="ceDate" value="' +
        escapeHtml(prefill.date || isoKey(new Date())) + '"></div>' +
      '<div class="ev-row"><span class="lab">时间</span><span class="ev-time">' +
        '<input type="time" id="ceStart" value="' + escapeHtml(prefill.start || '') + '"> – ' +
        '<input type="time" id="ceEnd"></span></div>' +
      '<div class="ev-row"><span class="lab"></span><span class="ev-hint">时间留空 = 全天</span></div>' +
      '<div class="ev-evi">你自己建的事件会立即显示在日历上（不走 AI 确认门，也不写外部日历）。</div>' +
      '<div class="ev-pop-actions">' +
      '<button class="dD-cbtn prim" data-act="ce-save">创建</button>' +
      '<button class="dD-cbtn sec" data-act="ev-close">取消</button>' +
      '</div></div>';
    back.addEventListener('click', function (e) {
      if (e.target === back) { closeEventPopup(); return; }
      var trigger = e.target.closest('[data-act]');
      if (!trigger) return;
      if (trigger.dataset.act === 'ev-close') { closeEventPopup(); return; }
      if (trigger.dataset.act === 'ce-save') { createEvent(); return; }
    });
    document.body.appendChild(back);
    var t = document.getElementById('ceTitle');
    if (t) t.focus();
  }

  function createEvent() {
    if (state.busy) return;
    var title = ((document.getElementById('ceTitle') || {}).value || '').trim();
    var date = (document.getElementById('ceDate') || {}).value || '';
    var start = (document.getElementById('ceStart') || {}).value || '';
    var end = (document.getElementById('ceEnd') || {}).value || '';
    if (!title) { var t = document.getElementById('ceTitle'); if (t) t.focus(); return; }
    if (!date) { var dEl = document.getElementById('ceDate'); if (dEl) dEl.focus(); return; }
    state.busy = true;
    fetch('/api/calendar/create?title=' + encodeURIComponent(title) + '&date=' + encodeURIComponent(date) +
      '&start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end), { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.error) { showToast('创建失败：' + escapeHtml(res.error)); return; }
        closeEventPopup();
        showToast('已创建「' + title + '」');
        return refresh();
      })
      .catch(function (err) { showToast('创建失败：' + escapeHtml(err)); })
      .finally(function () { state.busy = false; });
  }

  function deleteEvent(eventId) {
    if (state.busy || !eventId) return;
    showConfirm('删除这个事件？只删本地，不影响外部日历。', function () {
      state.busy = true;
      fetch('/api/calendar/delete?event_id=' + encodeURIComponent(eventId), { method: 'POST' })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.error) { showToast('删除失败：' + escapeHtml(res.error)); return; }
          closeEventPopup();
          showToast('已删除');
          return refresh();
        })
        .catch(function (err) { showToast('删除失败：' + escapeHtml(err)); })
        .finally(function () { state.busy = false; });
    });
  }

  // a day with many events shows a few chips + "+N more"; this lists ALL of them so
  // nothing is unreachable when a cell can't fit every chip
  function openDayPopup(dateKey) {
    var items = state.events.filter(function (it) { return it.dateKey === dateKey; });
    if (!items.length) return;
    closeEventPopup();
    var d = parseKey(dateKey);
    var title = d ? ((d.getMonth() + 1) + '月' + d.getDate() + '日') : dateKey;
    var back = document.createElement('div');
    back.className = 'ev-pop-back';
    back.id = 'evPopBack';

        '<span class="day-dot" style="background:' + col + '"></span>' +
        '<span class="day-ev-t">' + escapeHtml(it.title) + (it.uncertain ? ' ?' : '') + '</span>' +
        '<span class="day-ev-s">' + (it.pending ? '草稿' : '已确认') + '</span></div>';
    }).join('');
    back.innerHTML = '<div class="ev-pop"><span class="ev-x" data-act="ev-close">×</span>' +
      '<h3>' + escapeHtml(title) + ' · ' + items.length + ' 个事件</h3>' +
      '<div class="day-ev-list">' + rows + '</div></div>';
    back.addEventListener('click', function (e) {
      if (e.target === back || e.target.closest('[data-act="ev-close"]')) { closeEventPopup(); return; }
      var row = e.target.closest('[data-ev]');
      if (row) { var it = getEventById(row.dataset.ev); if (it) openEventPopup(it); }

  function openEventPopup(item) {

        '<button class="dD-cbtn sec" data-act="ev-ignore">忽略</button>' +

    back.innerHTML =
      '<div class="ev-pop" id="evPop">' +
      '<span class="ev-x" data-act="ev-close">×</span>' +
      statusBadge +
      '<h3>' + escapeHtml(item.title) + (item.uncertain ? ' ?' : '') + '</h3>' +
      '<div class="ev-row"><span class="lab">标题</span><input type="text" id="evTitle" value="' + escapeHtml(item.title) + '"></div>' +
      '<div class="ev-row"><span class="lab">' + dateLabel + '</span><input type="text" id="evDate" value="' +
        escapeHtml(item.dateText || item.dateKey || '') + '" placeholder="如 2026-07-01 或 July 1, 2026"></div>' +
      '<div class="ev-row"><span class="lab">时间</span><span class="ev-time">' +
        '<input type="time" id="evStart" value="' + escapeHtml(item.startTime || '') + '"> – ' +
        '<input type="time" id="evEnd" value="' + escapeHtml(item.endTime || '') + '"></span></div>' +
      '<div class="ev-row"><span class="lab">类别</span><div class="ev-cats" id="evCats">' +
        catChipsHtml(item) + catAddHtml(false) + '</div></div>' +
      sourceRow +
      '<div class="ev-evi">' + note + '</div>' +
      '<div class="ev-pop-actions">' + actions + '</div></div>';
    back.addEventListener('click', function (e) {
      if (e.target === back) { closeEventPopup(); return; }
      var trigger = e.target.closest('[data-act],[data-cat]');
      if (!trigger) return;
      if (trigger.dataset.cat) {
        setEventCategory(item.eventId, trigger.dataset.cat);
        renderCalendar();
        renderCatRow(item, false);
        return;
      }
      var act = trigger.dataset.act;
      if (act === 'ev-close') { closeEventPopup(); return; }
      if (act === 'ev-add-cat') { renderCatRow(item, true); return; }
      if (act === 'ev-add-cat-confirm') {
        var nameEl = document.getElementById('newCatName');
        var colorEl = document.getElementById('newCatColor');
        var name = nameEl && nameEl.value.trim();
        if (!name) { if (nameEl) nameEl.focus(); return; }
        var key = addCategory(name, (colorEl && colorEl.value) || '#6A5BD0');
        setEventCategory(item.eventId, key);
        renderCalendar();
        renderCatRow(item, false);
        return;
      }
      if (act === 'ev-save') { saveEventEdits(item); return; }
      if (act === 'ev-delete') { deleteEvent(item.eventId); return; }
      if (act === 'ev-source') { openCalendarEvidence(item.eventId); return; }
      if (act === 'ev-confirm') { closeEventPopup(); handleConfirm(item.eventId, document.createElement('div')); return; }
      if (act === 'ev-ignore') { closeEventPopup(); handleIgnore(item.eventId, document.createElement('div')); return; }
    });
    document.body.appendChild(back);
  }

  // ---------- toast notifications (replace post-action chat messages; no scroll) ----------
  var toastTimer = null;
  function dismissToast() {
    var wrap = document.getElementById('dDToastWrap');
    if (wrap) wrap.innerHTML = '';
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  }
  function showToast(message, opts) {
    opts = opts || {};
    var wrap = document.getElementById('dDToastWrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.className = 'dD-toast-wrap';
      wrap.id = 'dDToastWrap';
      document.body.appendChild(wrap);
    }
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    var undoBtn = opts.onUndo ? '<button class="undo" data-toast-undo>↩ ' + escapeHtml(opts.undoLabel || '退回') + '</button>' : '';
    wrap.innerHTML = '<div class="dD-toast"><span class="msg">' + escapeHtml(message) + '</span>' + undoBtn +
      '<button class="x" data-toast-x aria-label="关闭">×</button></div>';
    var card = wrap.querySelector('.dD-toast');
    if (opts.onUndo) {
      card.querySelector('[data-toast-undo]').addEventListener('click', function () { dismissToast(); opts.onUndo(); });
    }
    card.querySelector('[data-toast-x]').addEventListener('click', dismissToast);
    toastTimer = setTimeout(dismissToast, opts.duration || 8000);
  }

  // In-app confirmation (replaces native window.confirm so the page never freezes
  // behind a system dialog). Resolves by calling onConfirm; no auto-dismiss.
  function showConfirm(message, onConfirm) {
    var wrap = document.getElementById('dDToastWrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.className = 'dD-toast-wrap';
      wrap.id = 'dDToastWrap';
      document.body.appendChild(wrap);
    }
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    wrap.innerHTML = '<div class="dD-toast confirm"><span class="msg">' + escapeHtml(message) + '</span>' +
      '<button class="cancel" data-toast-cancel>取消</button>' +
      '<button class="ok" data-toast-ok>确认</button></div>';
    var card = wrap.querySelector('.dD-toast');
    card.querySelector('[data-toast-ok]').addEventListener('click', function () { dismissToast(); onConfirm(); });
    card.querySelector('[data-toast-cancel]').addEventListener('click', dismissToast);
  }

  // Undo the most recent local task review (done/needs_verification/reviewed/ignored).
  // The action is already persisted in 查看历史; this just reverses the latest one.
  function undoLatestReview() {
    fetch('/api/tasks/review/history?limit=1')
      .then(function (r) { return r.json(); })
      .then(function (payload) {
        var entry = ((payload && payload.history) || [])[0];
        if (!entry || !entry.audit_id || !entry.undoable) { showToast('这条已无法退回（可在“更多 › 查看历史”里查看）'); return null; }
        var cid = 'ui-undo-' + entry.audit_id + '-' + Date.now();
        return fetch('/api/tasks/review/undo', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audit_id: Number(entry.audit_id), confirm: true, confirmation_id: cid })
        }).then(function (r) { return r.json(); });
      })
      .then(function (result) {
        if (!result) return null;
        if (result.error || !result.allowed) { showToast('退回失败：' + escapeHtml(result.reason || result.error || '未知')); return null; }
        state.taskCursor = 0;
        return refresh().then(function () { renderReviewCard(); showToast('已退回'); });
      })
      .catch(function (err) { showToast('退回失败：' + escapeHtml(err)); });
  }

      })

  function taskReviewCard(task, meta) {
    // One card per source email. `task.kinds` lists every fact kind the email
    // produced; `task.facts` is the per-kind breakdown so the user sees the whole
    // obligation (date + amount + action) at a glance and clears it in one click.
    var kinds = Array.isArray(task.kinds) && task.kinds.length ? task.kinds : [task.kind];
    var kindLabel = kinds.map(function (k) { return TASK_KIND_LABEL[k] || k; }).filter(Boolean).join('·') || '任务';
    var status = REVIEW_STATUS_LABEL[task.status] || task.status || 'new';
    var facts = Array.isArray(task.facts) && task.facts.length
      ? task.facts
      : [{ kind: task.kind, values: (Array.isArray(task.values) && task.values.length ? task.values : (task.value ? [task.value] : [])) }];
    var factHtml = facts.map(function (fact) {
      if (!fact.values || !fact.values.length) return '';
      var label = TASK_KIND_LABEL[fact.kind] || fact.kind || '';
      var vals = fact.values.slice(0, 4).map(function (value) {
        return '<span title="' + escapeHtml(value) + '">' + escapeHtml(value) + '</span>';
      }).join('');
      if (fact.values.length > 4) vals += '<span>+' + (fact.values.length - 4) + '</span>';
      return '<div class="dD-task-fact"><span class="fk">' + escapeHtml(label) + '</span>' +
        '<span class="fv">' + vals + '</span></div>';
    }).join('');
    var ids = (Array.isArray(task.task_ids) && task.task_ids.length ? task.task_ids : [task.task_id]).join(',');
    var doneLabel = task.child_count > 1 ? '✓ 处理完 · ' + task.child_count + ' 项' : '✓ 处理完';
    return '<div class="dD-body">这封邮件有 ' + (task.child_count || 1) + ' 项待处理。操作只更新本地任务状态。</div>' +
      '<div class="dD-embed task tappable" data-act="task-card" data-task-id="' + escapeHtml(task.task_id) +
        '" role="button" tabindex="0" title="点击查看邮件内容">' +
      '<div class="dD-task-kind">' + (meta ? escapeHtml(meta) + ' · ' : '') +
      escapeHtml(kindLabel) + ' · ' + escapeHtml(status) + '</div>' +
      '<div class="etitle">' + escapeHtml(task.subject || task.title || 'Review task') + '</div>' +
      (factHtml ? '<div class="dD-task-facts">' + factHtml + '</div>' : '') +
      '<div class="esrc">来源 · ' + escapeHtml(task.subject || task.primary_source || task.source_type || '本地证据') +
      ' · 置信 ' + Number(task.confidence || 0).toFixed(2) + '</div>' +
      (task.needs_verification ? '<div class="enote">这封里有置信度较低的项，建议先核对原始邮件或门户。</div>' : '') +
      (task.evidence ? '<div class="enote">' + escapeHtml(clip(task.evidence, 160)) + '</div>' : '') +
      '<div class="dD-tap-hint">点击查看邮件内容 ›</div>' +
      '</div>' +
      '<div class="dD-btns dD-task-actions" data-task-id="' + escapeHtml(task.task_id) +
        '" data-task-ids="' + escapeHtml(ids) + '">' +
      '<button class="dD-cbtn prim" data-act="task-done">' + escapeHtml(doneLabel) + '</button>' +
